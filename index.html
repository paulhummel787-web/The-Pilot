<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Pilot and the Storm</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background:#0a0a0a;
    color:white;
    font-family: system-ui;
}

.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border:1px solid rgba(255,255,255,0.08);
}

.nav-btn { opacity:.4; }
.nav-btn.active { opacity:1; color:#818cf8; }

.terminal {
    background:black;
    color:#00ff88;
    font-family: monospace;
}
</style>
</head>

<body class="p-6">

<h1 class="text-xl mb-4">The Pilot and the Storm</h1>

<div class="flex gap-4 mb-4 text-xs">
    <button class="nav-btn active" onclick="switchTab('base')">Base</button>
    <button class="nav-btn" onclick="switchTab('book')">Book</button>
    <button class="nav-btn" onclick="switchTab('anchor')">Anchors</button>
    <button class="nav-btn" onclick="switchTab('terminal')">Terminal</button>
</div>

<div id="view"></div>

<script>

const state = {
    tab:'base',
    wave:70
};

const BOOK = [
"Symptom Soup",
"Shutdown",
"Pilot vs Architect",
"Color Grid",
"Prime Directive",
"... (continues)"
];

const ANCHORS = [
["I am a mistake","Psalm 139:14","I am fearfully made"],
["I am alone","Deuteronomy 31:8","God is ahead of me"]
];

let anchorIndex = 0;

function switchTab(tab){
    state.tab = tab;
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
    render();
}

function render(){
    const v = document.getElementById('view');

    if(state.tab==='base'){
        v.innerHTML = `
        <div class="glass p-4">
            Wave: ${state.wave}
        </div>`;
    }

    if(state.tab==='book'){
        v.innerHTML = BOOK.map((c,i)=>`
            <div class="glass p-2 mb-2">Chapter ${i+1}: ${c}</div>
        `).join('');
    }

    if(state.tab==='anchor'){
        const a = ANCHORS[anchorIndex];
        v.innerHTML = `
        <div class="glass p-4">
            <p>${a[0]}</p>
            <p>${a[1]}</p>
            <p>${a[2]}</p>
            <button onclick="nextAnchor()">Next</button>
        </div>`;
    }

    if(state.tab==='terminal'){
        v.innerHTML = `
        <div class="terminal p-3">
            <input onkeydown="cmd(event)" placeholder="/wave 50">
        </div>`;
    }
}

function nextAnchor(){
    anchorIndex = (anchorIndex+1)%ANCHORS.length;
    render();
}

function cmd(e){
    if(e.key==="Enter"){
        const val = e.target.value;
        if(val.startsWith("/wave")){
            state.wave = parseInt(val.split(" ")[1]) || state.wave;
            render();
        }
        e.target.value="";
    }
}

render();

</script>

</body>
</html>
