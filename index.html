<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Architect OS | Hive Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body id="app-body">

    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <header class="flex justify-between items-end mb-8 border-b border-amber-500/20 pb-6">
            <div>
                <h1 class="text-3xl font-black tracking-tighter uppercase italic text-amber-400">The <span class="text-white">Hive</span></h1>
                <p class="text-[10px] opacity-60 font-mono tracking-widest mt-1 text-amber-200">COLONY_SYNC // v27.0</p>
            </div>
            <div class="flex items-center gap-6">
                <button onclick="Architect.toggleVoice()" id="voice-btn" class="text-amber-900/40 hover:text-amber-400 transition-all">
                    <i class="fas fa-microphone-slash text-xl"></i>
                </button>
                <div class="text-right">
                    <div class="text-[10px] text-amber-500/40 uppercase font-bold mb-1">Honey Produced</div>
                    <div id="fuel-display" class="text-3xl font-black text-amber-400 font-mono">000</div>
                </div>
            </div>
        </header>

        <nav class="flex gap-6 mb-8 text-[11px] font-black uppercase tracking-[0.2em]">
            <button onclick="Architect.switchView('command')" class="nav-btn active" id="tab-command">The Deck</button>
            <button onclick="Architect.switchView('memory')" class="nav-btn" id="tab-memory">Memory</button>
            <button onclick="Architect.switchView('vault')" class="nav-btn" id="tab-vault">The Vault</button>
        </nav>

        <main id="view-command" class="view-section active space-y-6">
            <div class="glass p-6 grid grid-cols-3 md:grid-cols-6 gap-3" id="state-grid">
                </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="glass p-8 relative overflow-hidden" id="fox-container">
                    <div class="pacer-ring"></div>
                    <h2 class="text-[10px] font-bold uppercase tracking-widest text-amber-500/50 mb-4">Current Flight Path</h2>
                    <input id="fox-input" type="text" placeholder="Identify the nectar..." class="w-full bg-transparent text-xl font-medium focus:outline-none border-b border-amber-500/20 pb-2 mb-4 text-white" onchange="Architect.save()">
                    
                    <div class="mt-8">
                        <div class="flex justify-between text-[10px] mb-2 opacity-40 font-bold uppercase text-amber-200">
                            <span>Colony Integrity</span>
                            <span id="integrity-text">0%</span>
                        </div>
                        <div class="w-full bg-amber-900/20 h-1.5 rounded-full overflow-hidden">
                            <div id="integrity-bar" class="h-full bg-amber-400 shadow-[0_0_10px_#f59e0b] transition-all duration-1000" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div class="glass p-8 border-l-4 border-amber-500 flex flex-col justify-between" id="status-panel">
                    <p id="guidance-text" class="text-lg italic font-light text-amber-100/80">Hive stabilized. Awaiting coordinates.</p>
                    <button onclick="Architect.executeMVS()" class="execute-btn">
                        Deposit Nectar (MVS)
                    </button>
                </div>
            </div>

            <div id="log-terminal" class="glass p-4 h-32 overflow-y-auto text-[10px] font-mono text-amber-200/40 mt-6 border-amber-500/10">
                > Initializing Hive OS...
            </div>
        </main>

        <main id="view-memory" class="view-section space-y-6">
            <div class="glass p-8">
                <h2 class="text-[10px] font-bold uppercase tracking-widest text-amber-400 mb-4">Memory Cells</h2>
                <textarea id="memo-input" rows="4" placeholder="Externalize the buzz..." class="w-full bg-black/40 border border-amber-500/10 rounded-xl p-4 text-sm focus:outline-none focus:border-amber-500 text-amber-100 mb-4"></textarea>
                <button onclick="Architect.saveMemo()" class="px-8 py-2 bg-amber-500/10 border border-amber-500/20 rounded-lg text-[10px] font-black uppercase text-amber-400 hover:bg-amber-500 hover:text-black transition-all">Archive Cell</button>
            </div>
            <div id="memo-list" class="space-y-3"></div>
        </main>

        <main id="view-vault" class="view-section space-y-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black uppercase italic text-amber-400">The Honey Vault</h2>
                <button onclick="Architect.exportData()" class="text-[10px] font-bold uppercase bg-amber-500/5 px-4 py-2 rounded border border-amber-500/20 text-amber-500 hover:bg-amber-500/20 transition-all">Extract Data</button>
            </div>
            <div id="win-list" class="space-y-2"></div>
        </main>
    </div>

    <div id="bg-glow" class="fixed inset-0 pointer-events-none opacity-30 transition-all duration-1000"></div>

    <script src="engine.js"></script>
</body>
</html>
