<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Architect OS | Modular V1</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="p-4 md:p-8" id="app-body">

    <header class="max-w-4xl mx-auto flex justify-between items-end mb-8 border-b border-white/10 pb-6">
        <h1 class="text-3xl font-black tracking-tighter uppercase italic">Architect <span class="text-green-500">OS</span></h1>
        <div class="text-right">
            <div class="text-[10px] text-white/40 uppercase font-bold">System Fuel</div>
            <div id="fuel-display" class="text-2xl font-black text-yellow-400 font-mono">000</div>
        </div>
    </header>

    <nav class="max-w-4xl mx-auto flex gap-6 mb-8 text-[10px] font-black uppercase tracking-widest">
        <button onclick="switchView('command')" class="nav-btn active" id="tab-command">Command</button>
        <button onclick="switchView('memory')" class="nav-btn" id="tab-memory">Memory</button>
        <button onclick="switchView('vault')" class="nav-btn" id="tab-vault">Vault</button>
    </nav>

    <main id="view-command" class="view-section active max-w-4xl mx-auto space-y-6">
        <div class="glass p-6 grid grid-cols-3 md:grid-cols-6 gap-3" id="state-grid">
            </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="glass p-8 relative" id="fox-container">
                <div class="pacer-ring"></div>
                <input id="fox-input" type="text" placeholder="Current Fox..." class="w-full bg-transparent text-xl focus:outline-none border-b border-white/10 pb-2">
                <div class="mt-8">
                    <div id="integrity-bar-bg" class="w-full bg-white/5 h-1 rounded-full overflow-hidden">
                        <div id="integrity-bar" class="h-full bg-green-500 transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <div class="glass p-8 border-l-4 border-green-500" id="status-panel">
                <p id="guidance-text" class="text-lg italic font-light">Calibrating...</p>
                <button onclick="executeMVS()" class="execute-btn">Execute MVS</button>
            </div>
        </div>
    </main>

    <script src="engine.js"></script>
</body>
</html>
