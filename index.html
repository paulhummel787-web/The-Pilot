<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZION OS | SOVEREIGN EDITION</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#020205] text-amber-500 font-mono overflow-hidden">
    <div class="crt-overlay"></div>
    <div class="hex-grid"></div>

    <div class="relative z-10 h-screen flex flex-col p-6">
        <header class="flex justify-between items-end border-b border-amber-500/20 pb-4 mb-6">
            <div class="flex items-center gap-6">
                <div class="h-14 w-14 border-2 border-amber-500/40 flex items-center justify-center bg-amber-500/5 shadow-[0_0_30px_rgba(245,158,11,0.2)]">
                    <i class="fas fa-crown text-2xl animate-pulse"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black uppercase tracking-tighter text-white">ZION <span class="text-amber-500 opacity-40">SOVEREIGN</span></h1>
                    <p class="text-[10px] opacity-50 uppercase tracking-[0.5em]">The Infinite Exchange // Terminal_v4.0</p>
                </div>
            </div>
            <div class="text-right">
                <div class="text-[10px] opacity-30 uppercase tracking-widest">Global_Nectar_Yield</div>
                <div id="fuel-display" class="text-4xl font-black text-white leading-none">0000</div>
            </div>
        </header>

        <main class="flex-1 grid grid-cols-12 gap-6 overflow-hidden">
            <div class="col-span-2 flex flex-col">
                <div id="state-matrix" class="flex-1 space-y-3 overflow-y-auto custom-scroll pr-2"></div>
                <div class="glass-pane mt-4 p-4 border-t-4 border-amber-500">
                    <div class="text-[10px] opacity-40 mb-2 uppercase tracking-widest text-center">System Integrity</div>
                    <div id="integrity-label" class="text-3xl font-black text-white text-center">0%</div>
                    <div class="w-full bg-white/5 h-2 mt-4"><div id="integrity-bar" class="h-full bg-amber-500"></div></div>
                </div>
            </div>

            <div class="col-span-5 flex flex-col gap-6">
                <div class="glass-pane flex-1 relative overflow-hidden flex flex-col p-8" id="pacer-container">
                    <div class="pacer-ring"></div>
                    <div class="relative z-20 h-full flex flex-col">
                        <div class="flex justify-between text-[10px] font-black opacity-30 uppercase tracking-[0.4em] mb-8">
                            <span>Vol I: Architect OS</span>
                            <span>Calibration_Active</span>
                        </div>
                        <div id="tech-display" class="flex-1"></div>
                        <div id="system-log" class="h-24 overflow-y-auto custom-scroll text-[10px] opacity-30 border-t border-white/5 pt-4"></div>
                    </div>
                </div>
            </div>

            <div class="col-span-5 flex flex-col gap-6">
                <div class="glass-pane flex-1 p-8 flex flex-col border-l-4 border-amber-500 shadow-[40px_0_80px_rgba(0,0,0,0.8)] overflow-hidden">
                    <nav class="flex gap-8 mb-8 border-b border-white/10 pb-4">
                        <button onclick="Core.setTab('spirit')" id="tab-spirit" class="text-xs font-black uppercase tracking-widest">01_Spirit_Journey</button>
                        <button onclick="Core.setTab('vault')" id="tab-vault" class="text-xs font-black uppercase tracking-widest opacity-30">02_Library_Vault</button>
                    </nav>
                    
                    <div id="right-viewport" class="flex-1 overflow-y-auto custom-scroll pr-4"></div>

                    <div id="calibration-checklist" class="hidden mt-6 p-6 bg-amber-500/5 border border-amber-500/20 rounded">
                        <h4 class="text-[10px] font-black uppercase mb-4 text-amber-500 tracking-[0.3em]">Scaffolding_Checklist</h4>
                        <div id="checklist-items" class="grid grid-cols-1 gap-3"></div>
                    </div>

                    <button onclick="Core.executeDeposit()" class="mt-8 h-24 bg-amber-500 text-black font-black uppercase tracking-[0.8em] text-sm hover:bg-white hover:tracking-[1em] transition-all duration-500 shadow-[0_0_50px_rgba(245,158,11,0.3)]">
                        Deposit_Nectar
                    </button>
                </div>
            </div>
        </main>
    </div>
    <script src="knowledge.js"></script>
    <script src="app.js"></script>
</body>
</html>
