<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Architect OS | Bee Well v21.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            /* System Colors (State Based) */
            --yellow: #facc15;  /* ADHD / Static */
            --red: #ef4444;     /* Heat / BPD */
            --orange: #fb923c;  /* Threat / CPTSD */
            --purple: #8b5cf6;  /* Pressure / Anxiety */
            --blue: #3b82f6;    /* Gravity / Depression */
            --green: #10b981;   /* Flow / Regulated */
            
            /* UI Theme */
            --bg-base: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --accent: var(--purple);
            
            /* Dynamic Filter Variables */
            --state-glow: var(--purple);
            --blur-intensity: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-base);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            transition: background 0.5s ease, filter 0.8s ease;
        }

        /* ==========================================================================
           🌊 THE ENERGY ENGINE (BACKGROUND BLOBS)
           ========================================================================== */
        .energy-field {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            transition: all 2s cubic-bezier(0.4, 0, 0.2, 1);
            animation: float 20s infinite alternate;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(10vw, 20vh) scale(1.1); }
            66% { transform: translate(-5vw, 15vh) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* ==========================================================================
           💎 GLASSMORPHISM SYSTEM
           ========================================================================== */
        .glass {
            background: var(--glass);
            backdrop-filter: blur(var(--blur-intensity));
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .glass-card {
            padding: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* ==========================================================================
           🖥 UI COMPONENTS: NAVIGATION & HUD
           ========================================================================== */
        .nav-bar {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem;
            z-index: 50;
            width: 90%;
            max-width: 500px;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item.active {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        .metric-ring {
            position: relative;
            width: 120px;
            height: 120px;
        }

        /* ==========================================================================
           📟 THE TERMINAL & CONTENT
           ========================================================================== */
        .terminal-container {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 0, 0, 0.8);
            border-left: 3px solid var(--accent);
        }

        .chapter-node {
            border-left: 2px solid rgba(255, 255, 255, 0.1);
            padding-left: 1.5rem;
            margin-bottom: 2rem;
            position: relative;
        }

        .chapter-node::before {
            content: '';
            position: absolute;
            left: -6px;
            top: 0;
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
        }

        /* State Modifiers */
        body.static { --accent: var(--yellow); filter: saturate(1.2); }
        body.heat { --accent: var(--red); filter: contrast(1.1); }
        body.gravity { --accent: var(--blue); filter: brightness(0.8); }
        body.pressure { --accent: var(--purple); }
        body.sanctuary { --blur-intensity: 25px; filter: sepia(0.2); }

    </style>
</head>
<body class="p-4 md:p-8">

    <div class="energy-field">

        </div>

            <div id="system-clock" class="text-xl font-light text-white/80 tabular-nums">00:00:00</div>
            <div class="flex gap-2 mt-1">
                <span class="h-1 w-8 bg-green-500 rounded-full animate-pulse"></span>
                <span id="active-state-label" class="text-[9px] uppercase font-bold text-green-500 tracking-widest">Regulated</span>
            </div>
        </div>
    </header>

    <main id="app-viewport" class="max-w-4xl mx-auto space-y-6 pb-32">
        
        <section id="dashboard-tab" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="glass glass-card flex flex-col items-center justify-center relative overflow-hidden h-64">
                <canvas id="waveChart" class="absolute inset-0 z-0"></canvas>
                <div class="relative z-10 text-center">
                    <span class="text-xs uppercase tracking-widest text-white/40">Resiliency Wave</span>
                    <div id="wave-value" class="text-6xl font-black mt-2">70%</div>
                </div>
            </div>

            <div class="glass glass-card space-y-4">
                <div class="flex justify-between items-center">
                    <h3 class="text-xs uppercase tracking-[0.2em] text-white/60">Integrity Protocol</h3>
                    <span id="integrity-percent" class="text-indigo-400 font-mono text-xs">85%</span>
                </div>
                <div class="space-y-3" id="mini-habits-preview">
                    <div class="h-2 w-full bg-white/5 rounded-full overflow-hidden">
                        <div class="h-full bg-indigo-500 transition-all duration-1000" style="width: 85%"></div>
                    </div>
                </div>
                <button onclick="switchTab('pilot')" class="w-full py-3 bg-white/5 hover:bg-white/10 rounded-xl text-[10px] uppercase tracking-widest transition-all">
                    Initialize Full Audit
                </button>
            </div>
        </section>

        <div id="content-mount"></div>

    </main>

    <nav class="nav-bar glass">
        <div class="nav-item active" onclick="switchTab('dash')">
            <i class="fa-solid fa-gauge-high mb-1"></i>
            <span>Dash</span>
        </div>
        <div class="nav-item" onclick="switchTab('pilot')">
            <i class="fa-solid fa-compass mb-1"></i>
            <span>Pilot</span>
        </div>
        <div class="nav-item" onclick="switchTab('vault')">
            <i class="fa-solid fa-shield-halved mb-1"></i>
            <span>Vault</span>
        </div>
        <div class="nav-item" onclick="switchTab('terminal')">
            <i class="fa-solid fa-code mb-1"></i>
            <span>Term</span>
        </div>
    </nav>

    <script>
        // CORE KERNEL DATA
        const SYSTEM_VERSION = "21.0.4";
        const state = {
            wave: 70,
            integrity: 85,
            activeTab: 'dash',
            currentMode: 'regulated', // static, heat, pressure, gravity, sanctuary
            logs: []
        };
        /* ==========================================================================
           🧠 STATE INITIALIZATION & CONFIG
           ========================================================================== */
        const CONFIG = {
            states: {
                regulated: { color: 'var(--green)', label: 'Regulated Flow', blur: '12px', saturate: 1 },
                static: { color: 'var(--yellow)', label: 'ADHD Static', blur: '8px', saturate: 1.8 },
                heat: { color: 'var(--red)', label: 'BPD Heat', blur: '15px', saturate: 1.2 },
                threat: { color: 'var(--orange)', label: 'CPTSD Threat', blur: '10px', saturate: 1.5 },
                pressure: { color: 'var(--purple)', label: 'Anxiety Pulse', blur: '14px', saturate: 1 },
                gravity: { color: 'var(--blue)', label: 'Depression Gravity', blur: '30px', saturate: 0.5 },
                sanctuary: { color: 'white', label: 'Sanctuary Mode', blur: '40px', saturate: 0.2 }
            },
            habits: [
                { id: 'water', text: 'Biological Hydration', icon: 'fa-droplet' },
                { id: 'light', text: 'Retinal Sunlight', icon: 'fa-sun' },
                { id: 'move', text: 'Somatic Movement', icon: 'fa-person-running' },
                { id: 'cold', text: 'Vagus Cold Shock', icon: 'fa-icicles' }
            ]
        };

        // Initialize LocalStorage Persistence
        const storage = {
            save: (data) => localStorage.setItem('architect_os_data', JSON.stringify(data)),
            load: () => JSON.parse(localStorage.getItem('architect_os_data')) || null
        };

        let appState = storage.load() || {
    wave: 70,
    integrity: 0,
    mode: 'static',
    activeTab: 'dash',
    logs: [],
    habits: [],
    habitsCompleted: {},
    lastUpdate: Date.now(),
    mvs: []
};

// Sanitize
appState.wave = Number(appState.wave) || 70;
appState.integrity = Number(appState.integrity) || 0;

        /* ==========================================================================
           🌊 THE WAVE ENGINE (CHARTING & MATH)
           ========================================================================== */
        let waveChart;

        function initWaveChart() {
            const ctx = document.getElementById('waveChart').getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(139, 92, 246, 0.3)');
            gradient.addColorStop(1, 'rgba(139, 92, 246, 0)');

            waveChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(10).fill(''),
                    datasets: [{
                        label: 'Capacity',
                        data: [60, 65, 70, 68, 72, 75, 70],
                        borderColor: '#8b5cf6',
                        borderWidth: 3,
                        fill: true,
                        backgroundColor: gradient,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { display: false, min: 0, max: 100 }
                    }
                }
            });
        }

        /* ==========================================================================
           🎨 THE ATMOSPHERIC ENGINE (UI TRANSITIONS)
           ========================================================================== */
        function updateSystemAtmosphere(mode) {
            const settings = CONFIG.states[mode];
            appState.mode = mode;
            
            // Apply CSS Variables
            document.documentElement.style.setProperty('--accent', settings.color);
            document.documentElement.style.setProperty('--blur-intensity', settings.blur);
            
            // Body Classes for Filter Effects
            document.body.className = `p-4 md:p-8 state-transition ${mode}`;
            document.body.style.filter = `saturate(${settings.saturate})`;
            
            // Update HUD
            document.getElementById('active-state-label').innerText = settings.label;
            document.getElementById('active-state-label').style.color = settings.color;
            
            // Update Background Blobs
            const blobs = document.querySelectorAll('.blob');
            blobs.forEach((blob, i) => {
                blob.style.backgroundColor = settings.color;
                blob.style.opacity = mode === 'sanctuary' ? '0.05' : '0.15';
            });

            logSystemEvent(`Transitioned to ${settings.label}`);
            storage.save(appState);
        }

        /* ==========================================================================
           🛠 CORE FUNCTIONALITY
           ========================================================================== */
       function setWave(value) {
            // Force number conversion
            appState.wave = Number(appState.wave) || 0;

    let num = Number(value);
    if (isNaN(num)) num = 0;

    appState.wave = Math.max(0, Math.min(100, num));

    // Update UI
    const el = document.getElementById('wave-value');
    if (el) el.innerText = `${appState.wave}%`;

    // Update Chart safely
    if (waveChart) {
        waveChart.data.datasets[0].data.push(appState.wave);
        waveChart.data.datasets[0].data.shift();
        waveChart.update();
    }

    // Critical check
    if (appState.wave < 30) {
        triggerAlert("CRITICAL CAPACITY: Initialize Sanctuary Mode.");
    }

    storage.save(appState);
}
        function toggleHabit(id) {
            appState.habitsCompleted[id] = !appState.habitsCompleted[id];
            calculateIntegrity();
            renderHabits();
            storage.save(appState);
        }

        function calculateIntegrity() {
            const total = CONFIG.habits.length;
            const completed = Object.values(appState.habitsCompleted).filter(v => v).length;
            appState.integrity = Math.round((completed / total) * 100);
            
            const bar = document.querySelector('#mini-habits-preview div div');
            if (bar) bar.style.width = `${appState.integrity}%`;
            document.getElementById('integrity-percent').innerText = `${appState.integrity}%`;
        }

        function logSystemEvent(msg) {
            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            appState.logs.unshift(`[${timestamp}] ${msg}`);
            if (appState.logs.length > 20) appState.logs.pop();
        }

        /* ==========================================================================
           🧭 NAVIGATION & TAB ENGINE
           ========================================================================== */
        function switchTab(tabId) {
            // Update UI
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            appState.activeTab = tabId;
            renderView(tabId);
        }

        function renderView(tabId) {
            const mount = document.getElementById('content-mount');
            const dash = document.getElementById('dashboard-tab');
            
            // Hide Dashboard if not on Dash tab
            dash.style.display = tabId === 'dash' ? 'grid' : 'none';

            let html = '';
            switch(tabId) {
                case 'pilot':
                    html = renderPilotPortal();
                    break;
                case 'vault':
                    html = renderVault();
                    break;
                case 'terminal':
                    html = renderTerminal();
                    break;
            }
            mount.innerHTML = html;
        }

        // Clock Update
        setInterval(() => {
            const now = new Date();
            document.getElementById('system-clock').innerText = now.toLocaleTimeString([], { 
                hour12: false, 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
        }, 1000);

        window.onload = () => {
            initWaveChart();
            updateSystemAtmosphere(appState.mode);
            calculateIntegrity();
            renderHabits();
        };

        }

                mvs: "Set a timer for 90 seconds. Breathe. Do not label the feeling."

            {
                id: "ch7",
                title: "The Pilot and the Architect",
                module: "Execution",
                content: "The Architect builds the systems when the weather is clear. The Pilot flies the ship when the storm hits. The Pilot's job is not to fix the ship mid-flight, but to follow the Architect's manual.",
                mvs: "Execute one pre-planned habit without questioning the 'Why'."
            }
            // Additional 26 chapters will be mapped into the dynamic renderer
        ];

        /* ==========================================================================
           🧭 PILOT PORTAL RENDERER
           ========================================================================== */
        function renderPilotPortal() {
            return `
                <div class="space-y-6 animate-fade-in">
                    <div class="glass glass-card border-l-4 border-indigo-500">
                        <h2 class="text-xl font-bold uppercase tracking-tighter italic">The Pilot's Handbook</h2>
                        <p class="text-[10px] text-white/40 mt-1 uppercase tracking-widest">Flight Manual v21.0 / Operating Procedures</p>

            `;
        }

        /* ==========================================================================
           🛡️ INTEGRITY PROTOCOL (HABIT UI)
           ========================================================================== */
        function renderHabits() {
            const container = document.getElementById('mini-habits-preview');
            if (!container) return;

            container.innerHTML = CONFIG.habits.map(habit => {
                const isDone = appState.habitsCompleted[habit.id];
                return `
                    <div onclick="toggleHabit('${habit.id}')" 
                         class="flex items-center justify-between p-3 rounded-xl border transition-all cursor-pointer ${isDone ? 'bg-indigo-500/20 border-indigo-500/50' : 'bg-white/5 border-transparent'}">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg flex items-center justify-center ${isDone ? 'bg-indigo-500' : 'bg-white/10'}">
                                <i class="fa-solid ${habit.icon} text-xs ${isDone ? 'text-white' : 'text-white/40'}"></i>
                            </div>
                            <span class="text-xs font-medium ${isDone ? 'text-white' : 'text-white/60'}">${habit.text}</span>
                        </div>
                        <div class="w-5 h-5 rounded-full border-2 flex items-center justify-center ${isDone ? 'border-indigo-400 bg-indigo-400' : 'border-white/10'}">
                            ${isDone ? '<i class="fa-solid fa-check text-[10px] text-black"></i>' : ''}
                        </div>
                    </div>
                `;
            }).join('') + `
                <div class="mt-4 pt-4 border-t border-white/5">
                    <div class="flex justify-between text-[10px] uppercase tracking-widest text-white/40 mb-2">
                        <span>Current Integrity</span>
                        <span>${appState.integrity}%</span>
                    </div>
                    <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                        <div class="h-full bg-gradient-to-right from-indigo-600 to-purple-400 transition-all duration-700" 
                             style="width: ${appState.integrity}%"></div>
                    </div>
                </div>
            `;
        }

        /* ==========================================================================
           🔍 MODAL SYSTEM (CHAPTER VIEW)
           ========================================================================== */
        function openChapter(id) {
            const chapter = HANDBOOK.find(c => c.id === id);
            const modal = document.createElement('div');
            modal.className = "fixed inset-0 z-[100] flex items-end md:items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fade-in";
            modal.id = "chapter-modal";
            
            modal.innerHTML = `
                <div class="glass p-8 w-full max-w-2xl max-h-[80vh] overflow-y-auto relative animate-slide-up">
                    <button onclick="closeModal()" class="absolute top-6 right-6 text-white/40 hover:text-white">
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>
                    
                    <span class="text-xs font-mono text-indigo-400 uppercase tracking-widest">${chapter.module}</span>
                    <h2 class="text-3xl font-black mt-2 mb-6 uppercase italic">${chapter.title}</h2>
                    
                    <div class="prose prose-invert max-w-none text-white/70 leading-relaxed space-y-4">
                        <p>${chapter.content}</p>
                    </div>

                    <div class="mt-10 p-6 rounded-2xl bg-indigo-500/10 border border-indigo-500/20">
                        <h4 class="text-[10px] uppercase tracking-[0.2em] text-indigo-400 font-bold mb-3">Minimum Viable Step (MVS)</h4>
                        <p class="text-white italic">"${chapter.mvs}"</p>
                        <button onclick="closeModal(); setWave(Number(appState.wave) + 5);" 
                                class="mt-4 px-6 py-2 bg-indigo-500 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-indigo-400 transition-colors">
                            Step Completed (+5 Wave)
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function closeModal() {
            const m = document.getElementById('chapter-modal');
            if (m) m.remove();
        }
        /* ==========================================================================
           🛡️ THE TRUTH ANCHOR DATABASE
           ========================================================================== */
        const VAULT_DATA = {
            anchors: [
                {
                    lie: "I am a burden to everyone around me.",

            }
        };

        /* ==========================================================================
           🏛️ VAULT RENDERER (SANCTUARY MODE)
           ========================================================================== */

                        <div class="glass p-4 border border-red-500/20 flex items-center gap-4 opacity-80">
                            <i class="fa-solid fa-comment-slash text-red-500"></i>
                            <span class="text-[10px] font-bold text-white/80 uppercase">No Outgoing Texts/Calls</span>
                        </div>
                        <div class="glass p-4 border border-red-500/20 flex items-center gap-4 opacity-80">
                            <i class="fa-solid fa-ban text-red-500"></i>
                            <span class="text-[10px] font-bold text-white/80 uppercase">No Life Decisions</span>
                        </div>
                    </div>

                    <div class="p-6 bg-black/60 rounded-2xl border-dashed border-white/10 text-center">
                        <p class="text-xs text-white/50 italic leading-relaxed">
                            "An emotion lasts an average of 15 minutes if you don't 'Fuel' it with stories. Wait for the chemistry to clear."
                        </p>
                    </div>
                </div>
            `;
        }
        /* ==========================================================================
           🧱 THE TASK STACKER (MOUNTAIN-TO-PEBBLE CONVERTER)
           ========================================================================== */
        let taskStack = [];

        function addToStack() {
            const input = document.getElementById('stack-input');
            const task = input.value.trim();
            
            if (!task) return;
            if (taskStack.length >= 3) {
                triggerAlert("STACK FULL: Execute current pebbles before adding more.");
                return;
            }

            taskStack.push({ id: Date.now(), text: task, done: false });
            input.value = '';
            logSystemEvent(`STACKED: Pebble added - "${task}"`);
            renderView('stacker_hub');
        }

        function clearPebble(id) {
            taskStack = taskStack.filter(t => t.id !== id);
            logSystemEvent("PEBBLE CLEARED: Momentum +10%");
            setWave(Number(appState.wave) + 10);
            
            if (taskStack.length === 0) {
                triggerAlert("STACK DEPLETED: The Mountain is smaller now.");
            }
            renderView('stacker_hub');
        }

        /* ==========================================================================
           🧱 STACKER HUB RENDERER
           ========================================================================== */
        function renderStackerHub() {
            return `
                <div class="space-y-6 animate-fade-in">
                    <div class="glass glass-card border-l-4 border-indigo-500 bg-indigo-500/5 p-6">
                        <h2 class="text-xl font-bold uppercase tracking-tighter italic">Task Stacker</h2>
                        <p class="text-[10px] text-white/40 mt-1 uppercase tracking-widest font-mono">Status: Deconstructing Mountain into Pebbles</p>
                    </div>

                    <div class="glass p-4 border border-white/10 flex gap-2">
                        <input id="stack-input" type="text" 
                               class="flex-1 bg-transparent border-none text-sm text-white outline-none placeholder:text-white/20"
                               placeholder="Enter one tiny pebble...">
                        <button onclick="addToStack()" class="w-10 h-10 bg-indigo-600 rounded-lg hover:bg-indigo-500 transition-colors">
                            <i class="fa-solid fa-plus text-xs"></i>
                        </button>
                    </div>

                    <div class="flex flex-col-reverse gap-3 min-h-[200px] justify-start py-4">
                        ${taskStack.length === 0 ? `
                            <div class="flex-1 flex items-center justify-center border-2 border-dashed border-white/5 rounded-2xl">
                                <span class="text-[10px] uppercase tracking-widest text-white/20">Awaiting Pebbles</span>
                            </div>
                        ` : taskStack.map((t, i) => `
                            <div class="glass p-6 border-l-4 border-indigo-400 flex justify-between items-center animate-slide-up" 
                                 style="animation-delay: ${i * 0.1}s">
                                <div class="flex flex-col">
                                    <span class="text-[8px] font-mono text-indigo-400 uppercase mb-1">Pebble 0${i+1}</span>
                                    <span class="text-sm text-white font-medium">${t.text}</span>
                                </div>
                                <button onclick="clearPebble(${t.id})" class="w-8 h-8 rounded-full bg-white/5 hover:bg-emerald-500/20 text-white/20 hover:text-emerald-400 transition-all">
                                    <i class="fa-solid fa-check text-xs"></i>
                                </button>
                            </div>
                        `).join('')}
                    </div>

                    <div class="p-6 bg-indigo-900/10 rounded-2xl border border-indigo-500/20 text-center">
                        <p class="text-[11px] text-indigo-300 leading-relaxed italic">
                            "If you are stuck, the task is too big. Break the 'Pebble' into 'Sand.' You only ever have to do the bottom-most item."
                        </p>
                    </div>
                </div>
            `;
        }
        /* ==========================================================================
           🌟 THE HUMANIZING FILTER (IDEALIZATION BYPASS)
           ========================================================================== */
        const HUMANIZING_PROMPTS = [
            { id: 'flaw', label: 'Human Vulnerability', text: 'One thing they struggle with or a mistake they’ve made:' },
            { id: 'autonomy', label: 'Individual Orbit', text: 'One interest or life-goal they have that has nothing to do with me:' },
            { id: 'boundary', label: 'Safety Perimeter', text: 'One boundary I need to maintain to keep my "Battery" safe:' }
        ];

        function processHumanizingLog() {
            const win = document.getElementById('human-flaw').value;
            if (!win) return;

            logSystemEvent("IDEALIZATION FILTER: Humanizing data integrated. Reducing 'Golden Noise'.");
            
            // Re-centering the Pilot
            setWave(Number(appState.wave) + 12);
            triggerAlert("PERSPECTIVE REALIGNED: They are a person, not a pedestal.");
            
            // Clear inputs and return
            renderView('idealization_hub');
        }

        /* ==========================================================================
           🌟 IDEALIZATION HUB RENDERER
           ========================================================================== */
        function renderIdealizationHub() {
            return `
                <div class="space-y-6 animate-fade-in">
                    <div class="glass glass-card border-l-4 border-amber-400 bg-amber-400/5 p-6">
                        <div class="flex items-center gap-4">
                            <i class="fa-solid fa-wand-magic-sparkles text-2xl text-amber-400"></i>
                            <div>
                                <h2 class="text-xl font-bold uppercase tracking-tighter italic">Idealization Filter</h2>
                                <p class="text-[10px] text-amber-400/60 mt-1 uppercase tracking-widest font-mono">Status: Pedestal Warning / Golden Noise Detected</p>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div class="glass glass-card p-5 border-white/5">
                            <label class="text-[10px] font-bold uppercase tracking-widest text-amber-400 block mb-2">${HUMANIZING_PROMPTS[0].label}</label>
                            <p class="text-xs text-white/60 mb-3 italic">${HUMANIZING_PROMPTS[0].text}</p>
                            <textarea id="human-flaw" 
                                      class="w-full bg-black/20 border-none rounded-lg p-3 text-sm text-white outline-none focus:ring-1 focus:ring-amber-500/50"
                                      rows="2" placeholder="Integrating human data..."></textarea>
                        </div>

                        <div class="glass glass-card p-5 border-white/5">
                            <label class="text-[10px] font-bold uppercase tracking-widest text-amber-400 block mb-2">${HUMANIZING_PROMPTS[1].label}</label>
                            <p class="text-xs text-white/60 mb-3 italic">${HUMANIZING_PROMPTS[1].text}</p>
                            <textarea id="human-autonomy" 
                                      class="w-full bg-black/20 border-none rounded-lg p-3 text-sm text-white outline-none focus:ring-1 focus:ring-amber-500/50"
                                      rows="2" placeholder="Acknowledging their separate orbit..."></textarea>
                        </div>
                    </div>

                    <div class="glass p-6 text-center border-dashed border-white/10">
                        <p class="text-xs text-white/80 leading-relaxed italic">
                            "If you put them on a pedestal, they have no choice but to look down on you. Bring them back to the ground. It is safer for both of you here."
                        </p>
                    </div>

                    <button onclick="processHumanizingLog()" 
                            class="w-full py-4 bg-amber-600 hover:bg-amber-500 rounded-2xl font-black uppercase tracking-[0.2em] text-xs transition-all shadow-lg shadow-amber-900/40">
                        Calibrate Human Perception
                    </button>
                </div>
            `;
        }
        /* ==========================================================================
           🚀 SYSTEM INITIALIZATION (THE ENGINE START)
           ========================================================================== */
        window.onload = function() {
            // 1. Sync State with LocalStorage
            const savedState = localStorage.getItem('architect_state');
            if (savedState) {
                const parsed = JSON.parse(savedState);
                appState.wave = parsed.wave || 50;
                appState.activeProtocol = parsed.activeProtocol || 'yellow';
            }

            // 2. Initial Atmosphere Calibration
            updateSystemAtmosphere(appState.activeProtocol);

            // 3. Launch the Cockpit
            renderView('dash');
            
            // 4. Final System Log
            logSystemEvent("SYSTEM ONLINE: Architect OS v1.0 Fully Integrated.");
            triggerAlert("WELCOME HOME, PILOT. ALL SYSTEMS NOMINAL.");
            
            console.log("Architect OS: Flight Readiness 100%. Persistence Active.");
        };

        /* ==========================================================================
           💾 PERSISTENCE LOOP (AUTO-SAVE)
           ========================================================================== */
        setInterval(() => {
            const stateToSave = {
                wave: appState.wave,
                activeProtocol: appState.activeProtocol,
                lastSync: new Date().getTime()
            };
            localStorage.setItem('architect_state', JSON.stringify(stateToSave));
        }, 5000); // Save every 5 seconds

        /* ==========================================================================
           🛠️ GLOBAL ERROR HANDLER (THE BLACK-BOX)
           ========================================================================== */
        window.onerror = function(msg, url, line) {
            logSystemEvent(`CRITICAL GLITCH: ${msg} at line ${line}`);
            triggerAlert("SYSTEM STUTTER: Check console for telemetry.");
            return false;
        };

        /* ==========================================================================
           🏁 THE ARCHITECT'S FINAL COMMAND
           ========================================================================== */
        // Use this function to manually clear all data and reset the craft.
        function factoryReset() {
            if (confirm("WARNING: This will wipe all Wave data and reflections. Proceed?")) {
                localStorage.clear();
                window.location.reload();
            }
        }
        /* ==========================================================================
           🏁 END OF ARCHITECT OS MODULES
           ========================================================================== */
    </script>
</body>
</html>
