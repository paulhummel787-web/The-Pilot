<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZION OMNI | v41.0 Sovereign</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --yellow: #facc15; --red: #ef4444; --orange: #fb923c;
            --purple: #8b5cf6; --blue: #3b82f6; --green: #10b981;
            --pacer-color: var(--green);
        }
        body { background: #050508; color: white; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .bg-blob { position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, var(--pacer-color), transparent); filter: blur(120px); opacity: 0.15; z-index: -1; transition: all 2s ease; }
        .bg-blob:nth-child(1) { top: -100px; left: -100px; }
        .bg-blob:nth-child(2) { bottom: -100px; right: -100px; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .crt-overlay { position: fixed; inset: 0; pointer-events: none; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); background-size: 100% 3px, 3px 100%; z-index: 100; }
        @keyframes pulse-pacer { 0%, 100% { transform: scale(0.8); opacity: 0.1; } 50% { transform: scale(1.2); opacity: 0.4; box-shadow: 0 0 100px var(--pacer-color); } }
        .pacer-ring { position: absolute; inset: 0; border: 2px solid var(--pacer-color); border-radius: 50%; animation: pulse-pacer var(--pacer-speed, 10s) infinite ease-in-out; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--pacer-color); }
    </style>
</head>
<body>
    <div class="bg-blob" id="blob-1"></div>
    <div class="bg-blob" id="blob-2"></div>
    <div class="crt-overlay"></div>

    <div class="relative z-10 h-screen flex flex-col p-6">
        <header class="flex justify-between items-center border-b border-white/10 pb-6 mb-6">
            <div class="flex items-center gap-6">
                <div class="h-16 w-16 glass flex items-center justify-center border-2 border-white/20">
                    <i class="fas fa-hive text-3xl text-white animate-pulse"></i>
                </div>
                <div>
                    <h1 class="text-4xl font-black tracking-tighter italic">ZION <span class="opacity-40">OMNI</span></h1>
                    <div class="flex gap-4 text-[10px] uppercase tracking-[0.4em] opacity-40 mt-1">
                        <span>Wave: <span id="wave-id">00</span></span>
                        <span>Protocol: <span id="active-protocol">STANDBY</span></span>
                    </div>
                </div>
            </div>
            <div class="text-right">
                <div class="text-[10px] opacity-30 uppercase tracking-[0.5em] mb-1">Architect_Fuel</div>
                <div id="fuel-display" class="text-5xl font-black leading-none">0000</div>
            </div>
        </header>

        <main class="flex-1 grid grid-cols-12 gap-6 overflow-hidden">
            <div class="col-span-2 flex flex-col gap-4">
                <div id="state-matrix" class="flex-1 space-y-2 overflow-y-auto custom-scroll pr-2"></div>
                <div class="glass p-6 border-t-4 border-white/20">
                    <div class="text-[10px] opacity-40 mb-2 uppercase text-center">System Integrity</div>
                    <div id="integrity-label" class="text-4xl font-black text-center mb-4">0%</div>
                    <div class="w-full bg-white/5 h-2"><div id="integrity-bar" class="h-full bg-white transition-all duration-1000"></div></div>
                </div>
            </div>

            <div class="col-span-5 flex flex-col gap-6">
                <div class="glass flex-1 relative overflow-hidden flex flex-col p-10" id="pacer-container">
                    <div class="pacer-ring"></div>
                    <div class="relative z-20 flex-1 flex flex-col">
                        <div id="tech-display" class="flex-1"></div>
                        <div class="h-32 mt-6 border-t border-white/10 pt-4">
                            <canvas id="telemetryChart"></canvas>
                        </div>
                    </div>
                </div>
                <div class="glass h-24 p-4 text-[10px] opacity-30 overflow-y-auto custom-scroll font-mono" id="system-log"></div>
            </div>

            <div class="col-span-5 flex flex-col gap-6">
                <div class="glass flex-1 p-10 flex flex-col shadow-[50px_0_100px_rgba(0,0,0,0.8)] overflow-hidden">
                    <div class="flex gap-10 mb-8 border-b border-white/5 pb-4">
                        <button onclick="Core.setTab('spirit')" id="tab-spirit" class="text-xs font-black uppercase tracking-widest">01_Spirit_Journey</button>
                        <button onclick="Core.setTab('vault')" id="tab-vault" class="text-xs font-black uppercase tracking-widest opacity-30">02_Omni_Library</button>
                    </div>
                    
                    <div id="right-viewport" class="flex-1 overflow-y-auto custom-scroll pr-4"></div>

                    <button onclick="Core.executeDeposit()" class="mt-8 h-24 glass border-2 border-white/10 text-white font-black uppercase tracking-[1em] text-sm hover:bg-white hover:text-black transition-all duration-700 shadow-2xl">
                        Deposit_Nectar
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="knowledge.js"></script>
    <script src="app.js"></script>
</body>
</html>
