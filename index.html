<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Hive OS</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#050502] text-amber-500 font-mono overflow-hidden">
    <div class="crt-overlay"></div>
    
    <div class="h-screen flex flex-col p-6 relative z-10">
        <header class="flex justify-between items-center border-b border-amber-500/20 pb-4">
            <div class="flex items-center gap-4">
                <i class="fas fa-microchip text-2xl animate-pulse"></i>
                <h1 class="text-xl font-black tracking-tighter text-white">APEX_HIVE <span class="text-amber-500 opacity-50">v30.0.1</span></h1>
            </div>
            <div id="connection-node" class="text-[10px] px-3 py-1 border border-green-500/30 text-green-400 rounded-full">SYSTEM_READY</div>
        </header>

        <main class="flex-1 grid grid-cols-12 gap-6 mt-6 overflow-hidden">
            <div class="col-span-4 flex flex-col gap-4">
                <div class="glass-pane p-4 flex-1">
                    <h3 class="text-[10px] uppercase opacity-40 mb-4 tracking-[0.2em]">Yield Telemetry</h3>
                    <div class="h-48"><canvas id="yieldChart"></canvas></div>
                </div>
                <div class="glass-pane p-4 border-l-4 border-amber-500">
                    <h3 class="text-[10px] uppercase opacity-40 mb-2">Cognitive Governor</h3>
                    <div class="flex justify-between items-end">
                        <span id="integrity-label" class="text-4xl font-black text-white">0%</span>
                        <span class="text-[9px] mb-1 opacity-50">70% LIMIT</span>
                    </div>
                    <div class="w-full bg-white/5 h-2 mt-2"><div id="integrity-bar" class="h-full bg-amber-500 w-0 transition-all duration-700"></div></div>
                </div>
            </div>

            <div class="col-span-5 flex flex-col gap-4">
                <div class="glass-pane flex-1 flex flex-col items-center justify-center relative overflow-hidden" id="pacer-zone">
                    <div class="pacer-ring"></div>
                    <div class="relative z-20 text-center">
                        <input id="target-input" type="text" placeholder="SET TARGET PATH..." class="bg-transparent text-center text-2xl font-black text-white outline-none w-full uppercase placeholder:opacity-20">
                    </div>
                </div>
                <div class="glass-pane h-40 p-4 overflow-y-auto text-[10px] opacity-60 custom-scroll" id="system-log">
                    <div>> Initializing Apex kernel...</div>
                </div>
            </div>

            <div class="col-span-3 flex flex-col gap-4">
                <div class="glass-pane flex-1 p-4 overflow-hidden flex flex-col">
                    <h3 class="text-[10px] uppercase opacity-40 mb-4 tracking-[0.2em]">Vault_Cells</h3>
                    <div id="vault-grid" class="flex-1 overflow-y-auto space-y-2 custom-scroll">
                        </div>
                </div>
                <button onclick="Core.executeDeposit()" class="h-20 bg-amber-500 text-black font-black uppercase tracking-[0.5em] text-xs hover:bg-white transition-all shadow-[0_0_20px_rgba(245,158,11,0.3)]">Deposit_Nectar</button>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script src="telemetry.js"></script>
</body>
</html>
