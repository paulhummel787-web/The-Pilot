<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZION OMNI | Sovereign v7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --yellow: #facc15; --red: #ef4444; --orange: #fb923c;
            --purple: #a855f7; --blue: #3b82f6; --green: #10b981;
            --pacer-color: var(--green);
        }
        body { background: #050508; color: white; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .bg-blob { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, var(--pacer-color), transparent); filter: blur(140px); opacity: 0.15; z-index: -1; transition: all 3s ease; }
        .bg-blob:nth-child(1) { top: -200px; left: -100px; }
        .bg-blob:nth-child(2) { bottom: -200px; right: -100px; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.07); }
        .crt { position: fixed; inset: 0; pointer-events: none; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02)); background-size: 100% 2px, 2px 100%; z-index: 100; }
        @keyframes breathe { 0%, 100% { transform: scale(0.85); opacity: 0.2; } 50% { transform: scale(1.1); opacity: 0.5; box-shadow: 0 0 150px var(--pacer-color); } }
        .pacer { position: absolute; inset: 0; border: 4px solid var(--pacer-color); border-radius: 50%; animation: breathe var(--pacer-speed, 10s) infinite ease-in-out; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--pacer-color); border-radius: 10px; }
    </style>
</head>
<body class="p-8 h-screen flex flex-col">
    <div class="bg-blob"></div><div class="bg-blob"></div><div class="crt"></div>

    <header class="flex justify-between items-end border-b border-white/10 pb-8 mb-8">
        <div>
            <h1 class="text-6xl font-black italic tracking-tighter">ZION <span class="opacity-30">OMNI</span></h1>
            <p id="active-protocol" class="text-[10px] tracking-[0.8em] uppercase opacity-40 mt-2">Protocol: APEX_ALIGNMENT</p>
        </div>
        <div class="text-right">
            <div class="text-[10px] opacity-30 uppercase tracking-widest">Nectar_Yield</div>
            <div id="fuel-display" class="text-6xl font-black">0000</div>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-12 gap-8 overflow-hidden">
        <div class="col-span-2 flex flex-col gap-4" id="state-matrix"></div>

        <div class="col-span-5 flex flex-col gap-8">
            <div class="glass flex-1 relative overflow-hidden flex flex-col p-12" id="pacer-container">
                <div class="pacer"></div>
                <div class="relative z-20 flex-1" id="tech-display"></div>
            </div>
            <div class="glass h-32 p-4 text-[10px] opacity-30 overflow-y-auto custom-scroll" id="system-log"></div>
        </div>

        <div class="col-span-5 flex flex-col glass p-10 overflow-hidden shadow-2xl">
            <nav class="flex gap-12 mb-8 border-b border-white/5 pb-6">
                <button onclick="Core.setTab('spirit')" id="tab-spirit" class="text-xs font-black uppercase tracking-widest transition-all">01_The_Spirit</button>
                <button onclick="Core.setTab('vault')" id="tab-vault" class="text-xs font-black uppercase tracking-widest opacity-20 transition-all">02_Omni_Archive</button>
            </nav>
            <div id="right-viewport" class="flex-1 overflow-y-auto custom-scroll pr-4"></div>
            
            <div id="governor-ui" class="mt-8 border-t border-white/10 pt-8">
                <div class="flex justify-between text-[10px] uppercase tracking-widest opacity-40 mb-3">
                    <span>System_Integrity</span>
                    <span id="integrity-label">0%</span>
                </div>
                <div class="w-full bg-white/5 h-1 mb-8"><div id="integrity-bar" class="h-full bg-white transition-all duration-1000"></div></div>
                <button id="deposit-btn" onclick="Core.executeDeposit()" class="w-full h-24 bg-white text-black font-black uppercase tracking-[1em] text-sm hover:tracking-[1.2em] transition-all duration-500">DEPOSIT_NECTAR</button>
            </div>
        </div>
    </main>

    <script src="knowledge.js"></script>
    <script src="app.js"></script>
</body>
</html>
