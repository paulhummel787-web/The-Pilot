<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0a">

    <style>
        /* =========================
           🌈 CORE VARIABLES & SYSTEM COLORS
           ========================= */
        :root {
            --yellow: #facc15;  /* ADHD / Static */
            --red: #ef4444;     /* Heat */
            --blue: #3b82f6;    /* Depression Gravity */
            --purple: #8b5cf6;  /* Anxiety Pulse */
            --green: #10b981;   /* Regulated Flow */
            --orange: #fb923c;  /* Urgency */
            --bg-base: #0a0a0a;
        }

        body {
            background: var(--bg-base);
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            transition: background-color 0.4s, filter 0.4s;
            overflow-x: hidden;
        }

        /* =========================
           🌊 BACKGROUND ENERGY BLOBS
           ========================= */
        .bg-blob {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
            animation: floatBlob 20s infinite ease-in-out;
            transition: background 1s ease;
        }
        .bg-blob:nth-child(1) { top: -100px; left: -100px; }
        .bg-blob:nth-child(2) { bottom: -120px; right: -120px; animation-delay: 5s; }
        .bg-blob:nth-child(3) { top: 40%; left: 30%; animation-delay: 10s; }

        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(60px, -40px) scale(1.1); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* =========================
           ✨ GLASS & UI POLISH
           ========================= */
        .glass {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            border-radius: 16px;
        }
        .glass:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Buttons & Nav */
        .btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        .btn:hover {
            transform: scale(1.03);
            background: rgba(255, 255, 255, 0.15);
        }
        .nav-btn {
            opacity: 0.4;
            transition: 0.2s;
            position: relative;
            padding-bottom: 4px;
        }
        .nav-btn.active {
            opacity: 1;
            color: var(--purple);
        }
        .nav-btn.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--purple);
        }

        /* Terminal */
        .terminal {
            background: black;
            color: #00ff88;
            font-family: monospace;
            text-shadow: 0 0 6px rgba(0, 255, 136, 0.5);
        }

        /* Overlays & Animations */
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }

        /* HUDs */
        .hud-panel {
            position: fixed;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            z-index: 999;
            padding: 10px 14px;
            font-size: 11px;
        }
    </style>
</head>

/* ==========================================================================
   ⚙️ CORE SYSTEM LOGIC
   ========================================================================== */
function updateSystemState() {
    const w = state.wave;
    const i = state.integrity;
    
    if (w < 30) state.mode = "low";
    else if (w > 80 && i < 40) state.mode = "overloaded";
    else if (w > 70 && i > 60) state.mode = "sharp";
    else state.mode = "steady";

    // Update Color based on wave
    if(w < 30) state.color = 'blue';
    else if(w < 50) state.color = 'purple';
    else if(w < 70) state.color = 'yellow';
    else if(w < 85) state.color = 'red';
    else state.color = 'green';

    // Apply background colors dynamically
    const colorHex = { yellow: '#facc15', red: '#ef4444', blue: '#3b82f6', purple: '#8b5cf6', green: '#10b981', orange: '#fb923c' }[state.color];
    document.getElementById('blob1').style.background = colorHex;
    document.getElementById('blob2').style.background = state.color === 'yellow' ? '#ef4444' : '#facc15';
    document.getElementById('blob3').style.background = state.color === 'blue' ? '#8b5cf6' : '#3b82f6';
    
    document.body.style.boxShadow = `inset 0 0 120px rgba(${hexToRgb(colorHex)}, 0.15)`;

    // Update HUDs
    const guidance = {
        low: "Reduce everything. Drink water. One small movement.",
        overloaded: "Too much input. Remove stimulation. Breathe.",
        sharp: "High clarity detected. Chase the Fox.",
        steady: "Maintain rhythm. Stay with the current step."
    }[state.mode];
    
    document.getElementById('guidance-hud').innerText = `State: ${state.color.toUpperCase()} | ${guidance}`;
    document.getElementById('score-hud').innerText = `Level ${state.level} | XP: ${state.xp} | Score: ${state.score}`;
}

function hexToRgb(hex) {
    let bigint = parseInt(hex.replace('#',''), 16);
    return `${(bigint >> 16) & 255}, ${(bigint >> 8) & 255}, ${bigint & 255}`;
}

// Global loop
setInterval(() => {
    // Wave decay/recovery
    if(state.wave > 50) state.wave -= 0.5; else state.wave += 0.2;
    if(state.wave < 0) state.wave = 0;
    if(state.wave > 100) state.wave = 100;
    
    updateSystemState();
    
    // Auto record metrics
    if (Math.random() > 0.5) {
        state.metricsHistory.push({ time: new Date().toLocaleTimeString(), wave: state.wave, integrity: state.integrity });
        if(state.metricsHistory.length > 30) state.metricsHistory.shift();
    }
}, 5000);

/* ==========================================================================
   🖥️ UI RENDERERS
   ========================================================================== */
function switchTab(tab) {
    state.tab = tab;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    render();
}

function render() {
    updateSystemState();
    const v = document.getElementById('view');
    v.innerHTML = '';
    
    if (state.tab === 'base') v.innerHTML = renderCockpit();
    if (state.tab === 'book') renderBook(); // Self managing DOM
    if (state.tab === 'anchor') renderAnchor();
    if (state.tab === 'mvs') renderMVS();
    if (state.tab === 'terminal') v.innerHTML = renderTerminal();
}

    return `

            <p class="text-5xl font-light mb-2">${Math.round(state.wave)}<span class="text-xl opacity-50">%</span></p>

            <div class="w-full bg-white/10 h-1 rounded overflow-hidden mt-4">

                <button onclick="startAudit('mental')" class="btn py-4 rounded-xl text-sm font-bold tracking-wide">MENTAL RESET</button>
                <button onclick="startAudit('execution')" class="btn py-4 rounded-xl text-sm font-bold tracking-wide">EXEC RESET</button>

}

/* --- MVS Engine --- */
function renderMVS() {
    const v = document.getElementById('view');
    v.innerHTML = `
    <div class="glass p-6 max-w-2xl mx-auto fade-in">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-bold">Minimum Viable Steps</h2>
            <button onclick="addMVS(prompt('Enter a tiny step:'))" class="btn px-4 py-2 text-xs rounded-lg">+ Add Step</button>
        </div>
        <div class="space-y-3">
            ${state.mvsList.length === 0 ? '<p class="text-center opacity-40 text-sm">No active steps. System suggests: Drink water.</p>' : ''}
            ${state.mvsList.map(m => `
                <div class="flex justify-between items-center glass p-4 ${m.completed ? 'opacity-40' : ''}">
                    <span class="${m.completed ? 'line-through' : ''} cursor-pointer select-none" onclick="toggleMVS(${m.id})">${m.task}</span>
                    <button onclick="deleteMVS(${m.id})" class="text-red-400 hover:text-red-300 px-2">&times;</button>
                </div>
            `).join('')}
        </div>
    </div>`;
}

function addMVS(task) {
    if (!task) return;
    state.mvsList.push({ id: Date.now(), task, completed: false });
    if(state.tab === 'mvs') renderMVS();
}
function toggleMVS(id) {
    const m = state.mvsList.find(x => x.id === id);
    if (!m) return;
    m.completed = !m.completed;
    if (m.completed) { state.integrity += 3; updateScore('mvs_complete'); }
    if(state.tab === 'mvs') renderMVS();
}
function deleteMVS(id) {
    state.mvsList = state.mvsList.filter(x => x.id !== id);
    if(state.tab === 'mvs') renderMVS();
}

/* --- Terminal --- */
function renderTerminal() {
    return `
    <div class="terminal p-6 rounded-xl h-[60vh] flex flex-col fade-in">
        <div id="output" class="flex-1 overflow-y-auto mb-4 text-sm opacity-90 space-y-1">
            <div>> System Terminal Online. Type /help for commands.</div>
        </div>
        <input id="cmd" class="w-full bg-transparent border-t border-green-900 pt-4 outline-none text-green-400" placeholder="> Enter command..." onkeydown="handleCmd(event)">
    </div>`;
}

function handleCmd(e) {
    if (e.key !== "Enter") return;
    const val = e.target.value.trim();
    if (!val) return;
    
    log("> " + val);
    const args = val.split(" ");
    const cmd = args[0];

    switch(cmd) {
        case "/help":
            log("Commands: /wave [0-100], /audit, /mvs, /fox [task], /anchor, /truth, /clear"); break;
        case "/wave":
            const w = parseInt(args[1]);
            if (!isNaN(w)) { state.wave = Math.max(0, Math.min(100, w)); log("Wave set to " + state.wave); render(); }
            break;
        case "/audit": switchTab('base'); break;
        case "/mvs": switchTab('mvs'); break;
        case "/fox": state.fox = args.slice(1).join(" "); log("Fox locked: " + state.fox); break;
        case "/anchor":
        case "/truth": switchTab('anchor'); break;
        case "/clear": document.getElementById('output').innerHTML = ''; break;
        default: log("Unknown command.");
    }
    e.target.value = "";
}

function log(msg) {
    const out = document.getElementById('output');
    if (out) { out.innerHTML += `<div>${msg}</div>`; out.scrollTop = out.scrollHeight; }
}

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 fade-in h-[60vh]">
        <div class="glass p-4 overflow-y-auto hidden md:block">
            <h3 class="text-xs uppercase tracking-widest opacity-50 mb-4">Index</h3>
            ${FULL_BOOK.map((c, i) => `<button class="block w-full text-left text-xs py-2 opacity-60 hover:opacity-100 ${i === chapterIndex ? 'text-indigo-400 opacity-100 font-bold' : ''}" onclick="loadChapter(${i})">${c.title}</button>`).join('')}
        </div>
        <div class="glass p-8 md:col-span-3 overflow-y-auto relative">
            <h2 class="text-2xl font-bold mb-6">${FULL_BOOK[chapterIndex].title}</h2>
            <p class="opacity-80 leading-relaxed whitespace-pre-line text-sm md:text-base">${FULL_BOOK[chapterIndex].content}</p>
            <div class="flex justify-between mt-10">
                <button onclick="loadChapter(${chapterIndex - 1})" class="btn px-4 py-2 text-xs rounded">&larr; Prev</button>
                <button onclick="openReaderMode()" class="btn px-4 py-2 text-xs rounded border-indigo-500">Immersive Mode</button>
                <button onclick="loadChapter(${chapterIndex + 1})" class="btn px-4 py-2 text-xs rounded">Next &rarr;</button>
            </div>
        </div>
    </div>`;
}

function loadChapter(i) {
    if (i < 0) i = FULL_BOOK.length - 1;
    if (i >= FULL_BOOK.length) i = 0;
    chapterIndex = i;
    if(state.tab === 'book') renderBook();
}

function openReaderMode() {
    const ch = FULL_BOOK[chapterIndex];
    const overlay = document.createElement('div');
    overlay.className = "fixed inset-0 bg-[#050508] z-[9999] p-10 overflow-y-auto fade-in flex justify-center";
    overlay.innerHTML = `
        <div class="max-w-2xl w-full">
            <button onclick="this.parentElement.parentElement.remove()" class="mb-10 opacity-50 hover:opacity-100 tracking-widest text-xs uppercase">&larr; Exit Reader</button>
            <h2 class="text-3xl font-light mb-8">${ch.title}</h2>
            <p class="opacity-80 leading-loose text-lg whitespace-pre-line">${ch.content}</p>
        </div>`;
    document.body.appendChild(overlay);
}

/* --- Anchor & Identity Engine --- */
function renderAnchor() {
    const v = document.getElementById('view');
    // Filter anchors by current system state color, fallback to blue
    const activeAnchors = SCRIPTURE_ENGINE.filter(a => a.color === state.color) || SCRIPTURE_ENGINE.filter(a => a.color === 'blue');
    const a = activeAnchors[Math.floor(Math.random() * activeAnchors.length)];
    
    v.innerHTML = `
    <div class="glass p-10 text-center fade-in max-w-2xl mx-auto mt-10 glow-${state.color}">
        <p class="text-xs uppercase opacity-40 mb-2 tracking-widest">${a.category} Anchor</p>
        <p class="text-red-400 mb-6 italic text-sm">Lie: "${a.lie}"</p>
        <p class="text-2xl font-light text-indigo-300 mb-6 leading-relaxed">"${a.truth}"</p>
        <p class="text-xs opacity-50 mb-10">${a.verse}</p>
        
        <div class="flex justify-center gap-4">
            <button onclick="renderAnchor()" class="btn px-6 py-3 rounded-xl text-xs font-bold tracking-widest">NEXT TRUTH</button>
            <button onclick="truthOverride()" class="btn px-6 py-3 rounded-xl text-xs font-bold tracking-widest bg-white/5 border-red-500/50 hover:bg-red-900/20">FORCE OVERRIDE</button>
        </div>
    </div>`;
}

function truthOverride() {
    const overlay = document.createElement('div');
    overlay.className = "fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center p-10 text-center fade-in overflow-y-auto";
    const identityTruths = SCRIPTURE_ENGINE.filter(a => a.category === "Identity");
    overlay.innerHTML = `
        <h2 class="text-xs uppercase tracking-widest opacity-50 mb-10 text-red-500">System Override Initiated</h2>
        <div class="max-w-xl space-y-6">
            ${identityTruths.map(a => `<p class="text-lg opacity-90">${a.truth}</p>`).join('')}
        </div>
        <button onclick="this.parentElement.remove()" class="mt-12 btn px-8 py-3 rounded-full text-xs">Acknowledge</button>
    `;
    document.body.appendChild(overlay);
    updateScore('anchor_used');
}

/* ==========================================================================
   🛠️ MODULES & OVERLAYS
   ========================================================================== */

/* --- Audit Engine --- */
let auditState = { active: false, type: null, step: 0 };
function startAudit(type) {
    auditState = { active: true, type, step: 0 };
    renderAuditOverlay();
}
function nextAudit() { auditState.step++; renderAuditOverlay(); }
function endAudit() {
    document.getElementById('audit-overlay').remove();
    auditState.active = false;
    state.integrity += 10;
    updateScore('mvs_complete');
    render();
}
function renderAuditOverlay() {
    let overlay = document.getElementById('audit-overlay');
    if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = "audit-overlay";
        overlay.className = "fixed inset-0 bg-black/95 z-[10000] flex flex-col items-center justify-center p-10 text-center fade-in";
        document.body.appendChild(overlay);
    }
    const data = AUDITS[auditState.type];
    const stepTxt = data.steps[auditState.step];
    const isLast = auditState.step === data.steps.length - 1;

    overlay.innerHTML = `
        <div class="text-xs tracking-[3px] opacity-40 mb-8 uppercase">${data.title} • Step ${auditState.step + 1}/${data.steps.length}</div>
        <div class="text-3xl font-light mb-12 max-w-2xl leading-relaxed">${stepTxt}</div>
        <button onclick="${isLast ? 'endAudit()' : 'nextAudit()'}" class="btn px-10 py-4 rounded-full text-xs tracking-widest">${isLast ? 'COMPLETE' : 'NEXT'}</button>
        <div class="flex gap-2 mt-12">
            ${data.steps.map((_, i) => `<div class="w-2 h-2 rounded-full ${i === auditState.step ? 'bg-indigo-500 shadow-[0_0_10px_#818cf8]' : 'bg-white/10'}"></div>`).join('')}
        </div>
    `;
}

/* --- Gamification & Score --- */
function updateScore(type) {
    const map = { mvs_complete: 5, anchor_used: 3, fox_set: 4 };
    state.score += map[type] || 1;
    state.xp += 5;
    if (state.xp > state.level * 50) {
        state.level++;
        state.xp = 0;
        alert(`System Level Up: ${state.level}`);
    }
}
function openIdentity() {
    const overlay = document.createElement('div');
    overlay.className = "fixed inset-0 bg-black/90 z-[9999] p-10 flex flex-col items-center justify-center fade-in";
    overlay.innerHTML = `
        <div class="glass p-10 max-w-md w-full text-center">
            <h2 class="text-xl font-bold mb-6">System Identity</h2>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-white/5 p-4 rounded"><p class="text-xs opacity-50 uppercase">Level</p><p class="text-2xl">${state.level}</p></div>
                <div class="bg-white/5 p-4 rounded"><p class="text-xs opacity-50 uppercase">XP</p><p class="text-2xl">${state.xp}</p></div>
            </div>
            <p class="text-xs opacity-50 uppercase mb-2">Voice Personality</p>
            <select class="w-full bg-black border border-white/20 p-3 rounded mb-8 text-sm outline-none" onchange="state.personality = this.value">
                <option value="architect" ${state.personality==='architect'?'selected':''}>Architect</option>
                <option value="coach" ${state.personality==='coach'?'selected':''}>Coach</option>
                <option value="calm" ${state.personality==='calm'?'selected':''}>Calm</option>
            </select>
            <button onclick="this.parentElement.parentElement.remove()" class="btn w-full py-3 rounded">Close</button>
        </div>`;
    document.body.appendChild(overlay);
}

/* --- Analytics (Chart.js) --- */
let chartInstance = null;
function openAnalytics() {
    const overlay = document.createElement("div");
    overlay.className = "fixed inset-0 bg-black/95 z-[9999] p-10 flex flex-col items-center justify-center fade-in";
    overlay.innerHTML = `
        <div class="glass p-6 w-full max-w-4xl relative">
            <button onclick="this.parentElement.parentElement.remove()" class="absolute top-4 right-6 text-xs opacity-50 hover:opacity-100">Close</button>
            <h2 class="mb-6 font-bold tracking-widest uppercase text-xs opacity-50">System Analytics</h2>
            <canvas id="metricsChart" class="w-full h-64"></canvas>
        </div>`;
    document.body.appendChild(overlay);

    setTimeout(() => {
        const ctx = document.getElementById("metricsChart");
        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: state.metricsHistory.map(x => x.time),
                datasets: [
                    { label: 'Wave', data: state.metricsHistory.map(x => x.wave), borderColor: '#ef4444', tension: 0.3 },
                    { label: 'Integrity', data: state.metricsHistory.map(x => x.integrity), borderColor: '#818cf8', tension: 0.3 }
                ]
            },
            options: { responsive: true, color: 'rgba(255,255,255,0.5)', scales: { y: { beginAtZero: true, max: 100 } } }
        });
    }, 50);
}

/* --- Journal & Daily Fox --- */
function openJournal() {
    const overlay = document.createElement("div");
    overlay.className = "fixed inset-0 bg-black/95 z-[9999] p-10 flex flex-col items-center justify-center fade-in";
    overlay.innerHTML = `
        <div class="glass p-8 w-full max-w-2xl relative">
            <button onclick="this.parentElement.parentElement.remove()" class="absolute top-4 right-6 text-xs opacity-50 hover:opacity-100">Close</button>
            <h2 class="mb-4 font-bold tracking-widest uppercase text-xs opacity-50">System Journal</h2>
            <textarea id="journalInput" class="w-full bg-black/50 border border-white/10 p-4 rounded h-32 outline-none resize-none mb-4 text-sm" placeholder="Dump mental cache here..."></textarea>
            <button onclick="saveJournalEntry()" class="btn px-6 py-2 rounded text-xs">Commit Memory</button>
            <div class="mt-8 space-y-3 max-h-60 overflow-y-auto" id="journalList">
                ${renderJournalEntries()}
            </div>
        </div>`;
    document.body.appendChild(overlay);
}
function renderJournalEntries() {
    return state.journal.map(j => `<div class="bg-white/5 p-4 rounded text-sm"><p class="text-xs opacity-40 mb-2">${j.time}</p><p>${j.text}</p></div>`).reverse().join('');
}
function saveJournalEntry() {
    const input = document.getElementById('journalInput');
    if(!input.value.trim()) return;
    state.journal.push({ time: new Date().toLocaleString(), text: input.value });
    document.getElementById('journalList').innerHTML = renderJournalEntries();
    input.value = '';
}

function openDaily() {
    const overlay = document.createElement("div");
    overlay.className = "fixed inset-0 bg-black/95 z-[9999] p-10 flex flex-col items-center justify-center fade-in";
    overlay.innerHTML = `
        <div class="glass p-8 w-full max-w-md text-center relative">
            <button onclick="this.parentElement.parentElement.remove()" class="absolute top-4 right-6 text-xs opacity-50 hover:opacity-100">Close</button>
            <h2 class="mb-6 font-bold tracking-widest uppercase text-xs opacity-50">Chase the Fox</h2>
            <p class="text-sm opacity-80 mb-4">Set ONE high-impact target for today.</p>
            <input id="foxInput" class="w-full bg-black/50 border border-white/10 p-3 rounded text-center outline-none mb-6" value="${state.daily.fox || ""}" placeholder="Target...">
            <div class="flex justify-center gap-2">
                <button onclick="lockFox()" class="btn px-6 py-2 rounded text-xs bg-indigo-500/20 text-indigo-300">Lock Target</button>
                <button onclick="completeFox()" class="btn px-6 py-2 rounded text-xs bg-green-500/20 text-green-300">Mark Complete</button>
            </div>
        </div>`;
    document.body.appendChild(overlay);
}
function lockFox() {
    const input = document.getElementById('foxInput').value;
    state.daily.fox = input;
    updateScore('fox_set');
    alert("Fox Locked: " + input);
}
function completeFox() {
    state.daily.completed = true;
    state.integrity += 10;
    updateScore('mvs_complete');
    alert("Target Neutralized. Integrity Restored.");
}

/* --- Panic Mode --- */
function panicMode() {
    state.wave = 90;
    switchTab('anchor');
    const overlay = document.createElement('div');
    overlay.className = "fixed inset-0 bg-red-900/90 z-[10000] flex flex-col items-center justify-center p-10 text-center";
    overlay.innerHTML = `
        <h1 class="text-5xl font-bold mb-4">STOP</h1>
        <p class="text-xl mb-12">Do nothing. Breathe. You are safe.</p>
        <button onclick="this.parentElement.remove(); startAudit('biological');" class="btn px-10 py-4 bg-white text-black rounded-full font-bold">INITIATE EMERGENCY RESET</button>
    `;
    document.body.appendChild(overlay);
}

/* ==========================================================================
   🚀 SYSTEM INIT
   ========================================================================== */
window.onload = () => {
    // Initial metric entry
    state.metricsHistory.push({ time: new Date().toLocaleTimeString(), wave: state.wave, integrity: state.integrity });
    render();
    
    // Ambient System Voice Check-in
    setInterval(() => {
        const lines = PERSONALITIES[state.personality];
        const line = lines[Math.floor(Math.random()*lines.length)];
        const hud = document.createElement('div');
        hud.className = "fixed bottom-16 right-4 hud-panel fade-in text-indigo-300";
        hud.innerText = "🧠 " + line;
        document.body.appendChild(hud);
        setTimeout(() => hud.remove(), 6000);
    }, 45000);
};

</script>
</body>
</html>
