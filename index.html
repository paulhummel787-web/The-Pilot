<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Architect OS</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#050508;
    color:white;
    font-family:system-ui;
    overflow:hidden;
}

/* ROOT LAYERS */
#app{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
}

/* CORE PANELS */
#topbar{
    height:40px;
    display:flex;
    align-items:center;
    padding:0 10px;
    font-size:12px;
    opacity:.5;
}

#main{
    flex:1;
    display:flex;
    overflow:hidden;
}

#left{
    width:220px;
    border-right:1px solid rgba(255,255,255,.1);
    overflow:auto;
}

#center{
    flex:1;
    position:relative;
    overflow:hidden;
}

#right{
    width:260px;
    border-left:1px solid rgba(255,255,255,.1);
    overflow:auto;
}

/* OVERLAYS */
.overlay{
    position:fixed;
    inset:0;
    z-index:9999;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.95);
}

/* ANCHOR */
.anchor{
    position:absolute;
    bottom:20px;
    left:20px;
    background:black;
    padding:12px;
    border:1px solid #333;
    font-size:12px;
    max-width:240px;
}

/* TERMINAL */
#terminal{
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    background:black;
    border-top:1px solid #222;
    font-size:12px;
}

#terminal input{
    width:100%;
    background:black;
    border:none;
    color:#0f0;
    padding:6px;
    outline:none;
}
</style>
</head>

<body>

<div id="app">
    <div id="topbar">ARCHITECT SYSTEM</div>

    <div id="main">
        <div id="left"></div>
        <div id="center"></div>
        <div id="right"></div>
    </div>
</div>

<div id="terminal">
    <input id="cmd" placeholder="command..." onkeydown="cmdHandler(event)">
</div>

<script>

/* ================= GLOBAL ENGINE ================= */

const Engine = {
    state:{
        wave:65,
        integrity:50,
        color:"green",
        locked:false,
        mode:"idle",
        history:[]
    },

    systems:{},

    loopInterval:null,

    start(){
        this.loopInterval = setInterval(()=>{
            this.update();
        },1000);

        Renderer.init();
    },

    update(){
        // core wave drift
        this.state.wave += (Math.random()*2-1);

        // clamp
        this.state.wave = Math.max(0,Math.min(100,this.state.wave));

        // update systems
        for(let key in this.systems){
            this.systems[key].update?.();
        }

        Renderer.render();
    },

    register(name,system){
        this.systems[name]=system;
        system.init?.();
    }
};

/* ================= RENDERER ================= */

const Renderer = {

    init(){
        this.left = document.getElementById("left");
        this.center = document.getElementById("center");
        this.right = document.getElementById("right");
    },

    render(){
        this.renderLeft();
        this.renderCenter();
        this.renderRight();
    },

    renderLeft(){
        this.left.innerHTML = `
        <div class="p-2 text-xs opacity-60">
            <div>Wave: ${Engine.state.wave.toFixed(0)}</div>
            <div>Integrity: ${Engine.state.integrity}</div>
            <div>State: ${Engine.state.color}</div>
        </div>
        `;
    },

    renderCenter(){
        this.center.innerHTML = `
        <div class="p-4 text-sm">
            SYSTEM ACTIVE
        </div>
        `;
    },

    renderRight(){
        this.right.innerHTML = `
        <div class="p-2 text-xs opacity-50">
            modules loading...
        </div>
        `;
    }
};

/* ================= TERMINAL ================= */

function cmdHandler(e){
    if(e.key==="Enter"){
        const val = e.target.value;

        if(val.startsWith("/wave")){
            Engine.state.wave = parseInt(val.split(" ")[1])||Engine.state.wave;
        }

        if(val.startsWith("/mode")){
            Engine.state.mode = val.split(" ")[1]||"idle";
        }

        for(let key in Engine.systems){
            Engine.systems[key].command?.(val);
        }

        e.target.value="";
    }
}

/* ================= START ================= */

Engine.start();
/* =========================================================
   PART 2 — COCKPIT PANELS + LIVE UI SYSTEM
   ========================================================= */

/* ================= PANEL SYSTEM ================= */

const Panels = {

    left:[],
    center:[],
    right:[],

    register(side,renderFn){
        this[side].push(renderFn);
    },

    render(side){
        return this[side].map(fn=>fn()).join("");
    }
};

/* ================= BASE PANELS ================= */

/* LEFT: STATE PANEL */
Panels.register("left",()=>{

    const s = Engine.state;

    return `
    <div class="p-2 border-b border-white/10 text-xs">
        <div class="opacity-50 mb-1">STATE</div>
        <div>Wave: ${s.wave.toFixed(0)}</div>
        <div>Integrity: ${s.integrity}</div>
        <div class="mt-1">Color: ${s.color}</div>
    </div>
    `;
});

/* LEFT: QUICK ACTIONS */
Panels.register("left",()=>{

    return `
    <div class="p-2 border-b border-white/10 text-xs">
        <div class="opacity-50 mb-1">ACTIONS</div>

        <button onclick="Engine.state.wave+=5">+ wave</button><br>
        <button onclick="Engine.state.wave-=5">- wave</button><br>

        <button onclick="Engine.state.mode='focus'">focus</button><br>
        <button onclick="Engine.state.mode='reset'">reset</button>
    </div>
    `;
});

/* CENTER: MAIN FEED */
Panels.register("center",()=>{

    const s = Engine.state;

    return `
    <div class="p-4">
        <div class="text-xs opacity-40 mb-2">SYSTEM FEED</div>

        <div class="text-lg">
            ${s.mode.toUpperCase()}
        </div>

        <div class="mt-2 text-sm opacity-70">
            Wave level: ${s.wave.toFixed(0)}
        </div>
    </div>
    `;
});

/* CENTER: ALERT LAYER */
Panels.register("center",()=>{

    const s = Engine.state;

    let msg = "";

    if(s.wave > 80) msg = "OVERLOAD";
    else if(s.wave > 65) msg = "UNSTABLE";
    else if(s.wave < 30) msg = "LOW STATE";

    if(!msg) return "";

    return `
    <div class="p-4 text-red-400 text-lg">
        ${msg}
    </div>
    `;
});

/* RIGHT: SYSTEM STATUS */
Panels.register("right",()=>{

    return `
    <div class="p-2 border-b border-white/10 text-xs">
        <div class="opacity-50 mb-1">SYSTEMS</div>

        ${Object.keys(Engine.systems).map(s=>`
            <div>${s}</div>
        `).join("")}
    </div>
    `;
});

/* RIGHT: HISTORY */
Panels.register("right",()=>{

    const h = Engine.state.history.slice(-5).reverse();

    return `
    <div class="p-2 text-xs">
        <div class="opacity-50 mb-1">HISTORY</div>

        ${h.map(e=>`
            <div>${e.color} (${Math.round(e.wave)})</div>
        `).join("")}
    </div>
    `;
});

/* ================= OVERRIDE RENDERER ================= */

Renderer.renderLeft = function(){
    this.left.innerHTML = Panels.render("left");
};

Renderer.renderCenter = function(){
    this.center.innerHTML = Panels.render("center");
};

Renderer.renderRight = function(){
    this.right.innerHTML = Panels.render("right");
};

/* ================= STATE TRACKING ================= */

Engine.register("historyTracker",{
    update(){

        if(Math.random() < 0.2){
            Engine.state.history.push({
                wave:Engine.state.wave,
                color:Engine.state.color,
                t:Date.now()
            });

            if(Engine.state.history.length > 50){
                Engine.state.history.shift();
            }
        }
    }
});

/* ================= BASIC COLOR SYSTEM (TEMP) ================= */

Engine.register("colorCore",{

    update(){

        const w = Engine.state.wave;

        let c = "green";

        if(w > 85) c = "red";
        else if(w > 70) c = "yellow";
        else if(w > 50) c = "purple";
        else if(w < 30) c = "blue";

        Engine.state.color = c;

        document.body.className = c;
    }
});

/* =========================================================
   PART 3 — COLOR ENGINE + VISUAL SYSTEM
   ========================================================= */

/* ================= COLOR ENGINE ================= */

Engine.register("colorEngine",{

    intensity:0,

    update(){

        const w = Engine.state.wave;

        let color = "green";
        let intensity = 0;

        if(w >= 85){
            color = "red";
            intensity = (w-85)/15;
        }
        else if(w >= 70){
            color = "yellow";
            intensity = (w-70)/15;
        }
        else if(w >= 50){
            color = "purple";
            intensity = (w-50)/20;
        }
        else if(w < 30){
            color = "blue";
            intensity = (30-w)/30;
        }

        Engine.state.color = color;
        this.intensity = Math.max(0,Math.min(1,intensity));

        Visuals.apply(color,this.intensity);
    }
});

/* ================= VISUAL SYSTEM ================= */

const Visuals = {

    pulse:0,

    apply(color,intensity){

        // base color glow
        const colors = {
            red: "255,0,0",
            yellow: "255,200,0",
            blue: "0,120,255",
            purple: "180,0,255",
            green: "0,255,120"
        };

        const c = colors[color] || "255,255,255";

        // pulse effect
        this.pulse += 0.05;
        const pulseVal = (Math.sin(this.pulse)+1)/2;

        const glow = intensity * 0.6 + pulseVal * 0.2;

        document.body.style.boxShadow = `
            inset 0 0 ${200 + glow*200}px rgba(${c},${0.2 + glow*0.4})
        `;

        // subtle background shift
        document.body.style.background = `
            radial-gradient(circle at center, rgba(${c},${0.05 + glow*0.1}), #050508)
        `;
    }
};

/* ================= COLOR PANEL (UPGRADE UI) ================= */

Panels.register("left",()=>{

    const c = Engine.state.color;

    return `
    <div class="p-2 border-b border-white/10 text-xs">
        <div class="opacity-50 mb-1">COLOR SYSTEM</div>

        <div class="flex gap-2 mt-1">
            ${["green","blue","purple","yellow","red"].map(col=>`
                <button onclick="Engine.state.wave=${colorToWave(col)}"
                style="background:${col};width:16px;height:16px;">
                </button>
            `).join("")}
        </div>
    </div>
    `;
});

/* helper */
function colorToWave(c){
    return {
        blue:20,
        purple:55,
        yellow:75,
        red:90,
        green:65
    }[c];
}

/* ================= CENTER VISUAL FEEDBACK ================= */

Panels.register("center",()=>{

    const c = Engine.state.color;

    return `
    <div class="absolute inset-0 flex items-center justify-center pointer-events-none">

        <div style="
            width:200px;
            height:200px;
            border-radius:50%;
            background:${c};
            opacity:0.05;
            filter:blur(40px);
        "></div>

    </div>
    `;
});

/* ================= STATE TEXT FEEDBACK ================= */

Panels.register("center",()=>{

    const s = Engine.state;

    let msg = "";

    if(s.color==="red") msg = "OVERLOAD — STOP";
    else if(s.color==="yellow") msg = "TOO MANY INPUTS";
    else if(s.color==="purple") msg = "ANXIETY WAVE";
    else if(s.color==="blue") msg = "LOW ENERGY";
    else msg = "STABLE";

    return `
    <div class="p-4 text-sm opacity-70">
        ${msg}
    </div>
    `;
});

/* ================= ANCHOR ENGINE ================= */

Engine.register("anchorEngine",{

    lastTime:0,
    interval:12000,

    update(){

        const now = Date.now();

        // adjust frequency based on state
        if(Engine.state.color==="red") this.interval = 8000;
        else if(Engine.state.color==="yellow") this.interval = 10000;
        else this.interval = 14000;

        if(now - this.lastTime > this.interval){

            this.lastTime = now;

            this.inject();
        }
    },

    inject(){

        const color = Engine.state.color;
        const list = AnchorData[color] || AnchorData.green;

        const a = list[Math.floor(Math.random()*list.length)];

        AnchorUI.show(a);
    }
});

/* ================= ANCHOR UI ================= */

const AnchorUI = {

    show(anchor){

        const el = document.createElement("div");
        el.className = "anchor";

        el.innerHTML = `
            <div style="color:#ff4d4d;font-size:11px;margin-bottom:4px;">
                ${anchor.lie}
            </div>
            <div style="color:#818cf8;font-size:12px;">
                ${anchor.truth}
            </div>
        `;

        document.getElementById("center").appendChild(el);

        setTimeout(()=>{
            el.remove();
        },6000);
    },

    strong(anchor){

        const overlay = document.createElement("div");
        overlay.className = "overlay";

        overlay.innerHTML = `
            <div>
                <div style="color:#ff4d4d;margin-bottom:10px;">
                    ${anchor.lie}
                </div>

                <div style="color:#818cf8;font-size:20px;">
                    ${anchor.truth}
                </div>

                <button onclick="this.parentElement.parentElement.remove()"
                style="margin-top:20px;">
                Continue
                </button>
            </div>
        `;

        document.body.appendChild(overlay);
    }
};

/* ================= HARD ANCHOR TRIGGERS ================= */

const FlowData = {

    biological:[
        "Stop",
        "Stand up",
        "Drink water",
        "Cold water on face",
        "Breathe in 4",
        "Hold",
        "Out 6",
        "Again",
        "You are safe"
    ],

    mental:[
        "Stop thinking",
        "Observe thoughts",
        "Do nothing",
        "Let wave pass",
        "You are not your thoughts",
        "Wait"
    ],

    execution:[
        "Pick one task",
        "Make it smaller",
        "Start now",
        "Move body",
        "Continue",
        "Done"
    ]
};

/* ================= FLOW ENGINE ================= */

Engine.register("flowEngine",{

    active:false,
    current:null,
    step:0,

    start(type){

        this.active = true;
        this.current = type;
        this.step = 0;

        FlowUI.open(type,this.step);
    },

    next(){

        this.step++;

        const steps = FlowData[this.current];

        if(this.step >= steps.length){
            this.end();
            return;
        }

        FlowUI.update(this.step);
    },

    end(){

        this.active = false;
        this.current = null;
        this.step = 0;

        FlowUI.close();

        // reset wave slightly after completion
        Engine.state.wave -= 10;
    },

    update(){

        const s = Engine.state;

        // AUTO TAKEOVER
        if(!this.active){

            if(s.wave > 90 && Math.random() < 0.2){
                this.start("biological");
            }

            else if(s.color==="purple" && Math.random() < 0.05){
                this.start("mental");
            }
        }
    },

    command(cmd){

        if(cmd === "/reset") this.start("biological");
        if(cmd === "/body") this.start("biological");
        if(cmd === "/mind") this.start("mental");
        if(cmd === "/move") this.start("execution");
    }
});

/* ================= FLOW UI ================= */

const FlowUI = {

    el:null,

    open(type,step){

        const steps = FlowData[type];

        this.el = document.createElement("div");
        this.el.className = "overlay";

        this.el.innerHTML = `
            <div style="text-align:center;max-width:400px;">

                <div style="font-size:12px;opacity:.4;margin-bottom:10px;">
                    ${type.toUpperCase()} RESET
                </div>

                <div id="flowStep" style="font-size:22px;margin-bottom:20px;">
                    ${steps[step]}
                </div>

                <button onclick="Engine.systems.flowEngine.next()">
                    Next
                </button>

                <div style="margin-top:10px;font-size:10px;opacity:.3;">
                    follow steps — do not think
                </div>

            </div>
        `;

        document.body.appendChild(this.el);
    },

    update(step){

        const steps = FlowData[Engine.systems.flowEngine.current];

        this.el.querySelector("#flowStep").innerText = steps[step];
    },

    close(){

        if(this.el){
            this.el.remove();
            this.el = null;
        }
    }
};

/* ================= RIGHT PANEL: FLOW STATUS ================= */

Panels.register("right",()=>{

    const flow = Engine.systems.flowEngine;

    if(!flow.active){
        return `
        <div class="p-2 border-t border-white/10 text-xs">

/* =========================================================
   PART 6 — TERMINAL SYSTEM (COMMAND + LOG ENGINE)
   ========================================================= */

/* ================= TERMINAL ENGINE ================= */

Engine.register("terminalEngine",{

    log:[],

    max:40,

    write(msg){

        this.log.push(msg);

        if(this.log.length > this.max){
            this.log.shift();
        }

        this.render();
    },

    clear(){
        this.log = [];
        this.render();
    },

    render(){

        let el = document.getElementById("terminalLog");

        if(!el){
            el = document.createElement("div");
            el.id = "terminalLog";
            el.style = `
                position:absolute;
                bottom:30px;
                left:0;
                right:0;
                max-height:150px;
                overflow:auto;
                font-size:11px;
                padding:6px;
                background:rgba(0,0,0,.8);
                border-top:1px solid #222;
            `;
            document.body.appendChild(el);
        }

        el.innerHTML = this.log.map(l=>`<div>> ${l}</div>`).join("");
    },

    command(cmd){

        if(!cmd) return;

        this.write(cmd);

        const parts = cmd.split(" ");
        const base = parts[0];

        switch(base){

            case "/help":
                this.write("Commands:");
                this.write("/wave X");
                this.write("/color X");
                this.write("/reset /body /mind /move");
                this.write("/anchor");
                this.write("/state");
                this.write("/systems");
                this.write("/clear");
                break;

            case "/wave":
                Engine.state.wave = parseInt(parts[1]) || Engine.state.wave;
                this.write("wave set");
                break;

            case "/color":
                Engine.state.color = parts[1] || Engine.state.color;
                this.write("color override");
                break;

            case "/reset":
            case "/body":
                Engine.systems.flowEngine.start("biological");
                break;

            case "/mind":
                Engine.systems.flowEngine.start("mental");
                break;

            case "/move":
                Engine.systems.flowEngine.start("execution");
                break;

            case "/anchor":
                const list = AnchorData[Engine.state.color] || AnchorData.green;
                const a = list[Math.floor(Math.random()*list.length)];
                AnchorUI.strong(a);
                break;

            case "/state":
                this.write(JSON.stringify(Engine.state));
                break;

            case "/systems":
                this.write(Object.keys(Engine.systems).join(", "));
                break;

            case "/clear":
                this.clear();
                return;

            default:
                this.write("unknown command");
        }
    }
});

/* ================= HOOK INTO INPUT ================= */

function cmdHandler(e){

    if(e.key==="Enter"){

        const val = e.target.value;

        // send to terminal system
        Engine.systems.terminalEngine.command(val);

        // broadcast to all systems
        for(let key in Engine.systems){
            Engine.systems[key].command?.(val);
        }

        e.target.value="";
    }
}

        if(cmd.startsWith("/chapter")){
            const n = parseInt(cmd.split(" ")[1]);
            if(!isNaN(n)) this.chapter = n-1;
        }
    }
});

/* ================= OVERLAY MANAGER ================= */

const OverlayManager = {

    stack:[],

    open(el){

        document.body.appendChild(el);
        this.stack.push(el);
    },

    closeTop(){

        const el = this.stack.pop();
        if(el) el.remove();
    },

    closeAll(){

        while(this.stack.length){
            this.stack.pop().remove();
        }
    }
};

/* ================= INTELLIGENCE ENGINE ================= */

Engine.register("intelligenceEngine",{

    memory:[],
    maxMemory:30,

    pattern:null,

    update(){

        const s = Engine.state;

        /* ===== TRACK HISTORY ===== */
        this.memory.push({
            wave:s.wave,
            color:s.color,
            t:Date.now()
        });

        if(this.memory.length > this.maxMemory){
            this.memory.shift();
        }

        /* ===== DETECT PATTERNS ===== */
        this.pattern = this.detectPattern();

        /* ===== RESPOND ===== */
        this.respond();
    },

    detectPattern(){

        if(this.memory.length < 10) return null;

        const last = this.memory.slice(-10);

        const avgWave = last.reduce((a,b)=>a+b.wave,0)/last.length;

        const colors = last.map(x=>x.color);

        /* rising trend */
        const rising = last[0].wave < last[last.length-1].wave;

        /* repeated anxiety */
        const purpleCount = colors.filter(c=>c==="purple").length;

        /* low stagnation */
        const blueCount = colors.filter(c=>c==="blue").length;

        if(avgWave > 80 && rising) return "overload_rising";
        if(purpleCount > 6) return "anxiety_loop";
        if(blueCount > 6) return "low_stuck";
        if(avgWave < 60 && avgWave > 40) return "unstable_mid";

        return "stable";
    },

    respond(){

        const p = this.pattern;

        if(!p) return;

        /* ===== EARLY INTERVENTION ===== */

        if(p === "overload_rising"){

            // inject early anchor
            if(Math.random() < 0.2){
                Engine.systems.anchorEngine.inject();
            }

            // possible early flow
            if(Math.random() < 0.05 && !Engine.systems.flowEngine.active){
                Engine.systems.flowEngine.start("biological");
            }
        }

        if(p === "anxiety_loop"){

            if(Math.random() < 0.1){
                Engine.systems.anchorEngine.inject();
            }

            if(Math.random() < 0.05 && !Engine.systems.flowEngine.active){
                Engine.systems.flowEngine.start("mental");
            }
        }

        if(p === "low_stuck"){

            if(Math.random() < 0.1){
                Engine.systems.flowEngine.start("execution");
            }
        }

        if(p === "stable"){
            // reduce noise (future expansion)
        }
    },

    command(cmd){

        if(cmd === "/pattern"){
            Engine.systems.terminalEngine.write(this.pattern || "none");
        }
    }
});

/* ================= STORAGE SYSTEM ================= */

Engine.register("storageEngine",{

    key:"architect_system_v3",

    save(){

        const data = {
            state:Engine.state,
            book:{
                chapter:Engine.systems.bookEngine.chapter
            }
        };

        localStorage.setItem(this.key,JSON.stringify(data));
    },

    load(){

        const raw = localStorage.getItem(this.key);
        if(!raw) return;

        try{
            const data = JSON.parse(raw);

            if(data.state){
                Object.assign(Engine.state,data.state);
            }

            if(data.book){
                Engine.systems.bookEngine.chapter = data.book.chapter || 0;
            }

        }catch(e){
            console.log("load failed");
        }
    },

    init(){

        this.load();

        // auto save loop
        setInterval(()=>{
            this.save();
        },3000);
    },

    command(cmd){

        if(cmd === "/save"){
            this.save();
            Engine.systems.terminalEngine.write("saved");
        }

        if(cmd === "/load"){
            this.load();
            Engine.systems.terminalEngine.write("loaded");
        }
    }
});

/* ================= SAFETY SYSTEM ================= */

Engine.register("safetyEngine",{

    update(){

        const s = Engine.state;

        /* clamp wave hard */
        if(s.wave > 100) s.wave = 100;
        if(s.wave < 0) s.wave = 0;

        /* prevent infinite overlay stacking */
        if(OverlayManager.stack.length > 5){
            OverlayManager.closeTop();
        }

        /* auto recover lock */
        if(s.wave < 70){
            s.locked = false;
        }
    }
});

Engine.register("heartbeat",{

    tick:0,

    update(){

        this.tick++;

        /* slow drift toward baseline */
        if(this.tick % 5 === 0){

            if(Engine.state.wave > 65) Engine.state.wave -= 1;
            if(Engine.state.wave < 55) Engine.state.wave += 1;
        }
    }
});
