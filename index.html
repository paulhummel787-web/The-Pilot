const ANCHORS = [
["I am a mistake","Psalm 139:14","I am fearfully made"],
["I am alone","Deuteronomy 31:8","God is ahead of me"]
];

let anchorIndex = 0;

function switchTab(tab){
    state.tab = tab;
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
    render();
}

function render(){
    const v = document.getElementById('view');

    if(state.tab==='base'){
        v.innerHTML = `
        <div class="glass p-4">
            Wave: ${state.wave}
        </div>`;
    }

    if(state.tab==='book'){
        v.innerHTML = BOOK.map((c,i)=>`
            <div class="glass p-2 mb-2">Chapter ${i+1}: ${c}</div>
        `).join('');
    }

    if(state.tab==='anchor'){
        const a = ANCHORS[anchorIndex];
        v.innerHTML = `
        <div class="glass p-4">
            <p>${a[0]}</p>
            <p>${a[1]}</p>
            <p>${a[2]}</p>
            <button onclick="nextAnchor()">Next</button>
        </div>`;
    }

    if(state.tab==='terminal'){
        v.innerHTML = `
        <div class="terminal p-3">
            <input onkeydown="cmd(event)" placeholder="/wave 50">
        </div>`;
    }
}

function nextAnchor(){
    anchorIndex = (anchorIndex+1)%ANCHORS.length;
    render();
}

function cmd(e){
    if(e.key==="Enter"){
        const val = e.target.value;
        if(val.startsWith("/wave")){
            state.wave = parseInt(val.split(" ")[1]) || state.wave;
            render();
        }
        e.target.value="";
    }
}

/* =========================
🖥 ADVANCED TERMINAL ENGINE
========================= */

function log(msg){
    const out = document.getElementById('output');
    if(!out) return;
    out.innerHTML += `<div>> ${msg}</div>`;
    out.scrollTop = out.scrollHeight;
}

/* =========================
⌨️ COMMAND HANDLER
========================= */

const oldCmd = handleCmd;

handleCmd = function(e){

    if(e.key !== "Enter") return;

    const val = e.target.value.trim();
    log(val);

    const args = val.split(" ");
    const cmd = args[0];

    switch(cmd){

        case "/help":
            log("Commands:");
            log("/wave [0-100]");
            log("/state");
            log("/storm");
            log("/anchor");
            log("/reset");
            log("/mvs");
            break;

        case "/wave":
            const w = parseInt(args[1]);
            if(!isNaN(w)){
                state.wave = Math.max(0, Math.min(100, w));
                log("Wave set to " + state.wave);
                render();
            }
            break;

        case "/state":
            log("Wave: " + state.wave);
            log("Integrity: " + state.integrity);
            break;

        case "/storm":
            const s = getStormState();
            log(s.name + " — " + s.desc);
            break;

        case "/anchor":
            switchTab('anchor');
            break;

        case "/reset":
            state.wave = 70;
            state.integrity = 60;
            log("System reset to baseline.");
            render();
            break;

        case "/mvs":
            log("Minimum Viable Shift:");
            log("→ Stand up");
            log("→ Move body 10 seconds");
            log("→ Do 1 tiny task");
            break;

        default:
            log("Unknown command. Try /help");
    }

    e.target.value = "";

};

⚡ MVS ENGINE (MICRO ACTIONS)
========================= */

function getMVS(){

    const s = getStormState().name;

    const MVS_MAP = {

        "White Fog":[
            "Touch something cold",
            "Say your name out loud",
            "Look around and name 5 objects"
        ],

        "Blue Gravity":[
            "Stand up",
            "Walk 10 steps",
            "Drink water"
        ],

        "Purple Pulse":[
            "Breathe in 4 seconds",
            "Hold 4 seconds",
            "Exhale slowly"
        ],

        "Yellow Static":[
            "Pick 1 task only",
            "Set 2 minute timer",
            "Start without finishing"
        ],

        "Red Heat":[
            "Splash cold water",
            "Step away from people",
            "Wait 90 seconds"
        ],

        "Green Flow":[
            "Continue current task",
            "Stack next step",
            "Capture progress"
        ]

    };

    const list = MVS_MAP[s] || ["Take one small step"];

    return list[Math.floor(Math.random() * list.length)];
}

/* =========================
🎯 RENDER MVS PANEL
========================= */

function renderMVS(){

    const v = document.getElementById("cockpit-main");

    const action = getMVS();

    v.innerHTML = `
    <div class="glass p-6 text-center">

        <p class="text-xs opacity-40 mb-2">MVS Protocol</p>

        <p class="text-lg mb-4">${action}</p>

        <button onclick="renderMVS()" 
        class="bg-indigo-500 px-4 py-2 rounded text-xs">
            New Action
        </button>

    </div>
    `;
}

/* =========================
⛔ 10/20 BRAKES SYSTEM
========================= */

let brakeStart = null;
let brakeMode = null;

/* START TRACKING */
function startBrake(mode){

    brakeMode = mode; // "mental" or "physical"
    brakeStart = Date.now();

    renderBrakes();
}

/* RESET */
function resetBrake(){
    brakeStart = null;
    brakeMode = null;
    renderBrakes();
}

/* TIMER */
function getElapsed(){
    if(!brakeStart) return 0;
    return Math.floor((Date.now() - brakeStart)/1000);
}

/* RENDER */
function renderBrakes(){

    const v = document.getElementById("cockpit-main");

    if(!brakeStart){

        v.innerHTML = `
        <div class="glass p-6 text-center">

            <p class="text-xs opacity-40 mb-4">10 / 20 Brakes</p>

            <button onclick="startBrake('mental')" 
            class="bg-purple-500 px-4 py-2 rounded text-xs m-2">
                Start Mental Loop (10)
            </button>

            <button onclick="startBrake('physical')" 
            class="bg-yellow-500 px-4 py-2 rounded text-xs m-2">
                Start Stuck (20)
            </button>

        </div>
        `;

    } else {

        const sec = getElapsed();

        let trigger = (brakeMode === "mental") ? 600 : 1200;

        let message = "Tracking...";

        if(sec >= trigger){
            message = brakeMode === "mental"
                ? "⚠ CHANGE BODY NOW (cold water / movement)"
                : "⚠ CHANGE LOCATION NOW (move rooms)";
        }

        v.innerHTML = `
        <div class="glass p-6 text-center">

            <p class="text-xs opacity-40">${brakeMode.toUpperCase()} TRACK</p>

            <p class="text-2xl mb-4">${sec}s</p>

            <p class="mb-4">${message}</p>

            <button onclick="resetBrake()" 
            class="bg-red-500 px-4 py-2 rounded text-xs">
                RESET
            </button>

        </div>
        `;
    }
}

/* LOOP UPDATE */
setInterval(()=>{
    if(state.tab === "brakes" && brakeStart){
        renderBrakes();
    }
},1000);

========================= */

function enableSanctuary(){

    document.body.classList.add("sanctuary");

    document.body.style.background = "#050508";
    document.body.style.color = "#d4d4d8";

    document.querySelectorAll('.glass').forEach(el=>{
        el.style.background = "rgba(120,120,255,0.05)";
        el.style.border = "1px solid rgba(255,255,255,0.05)";
    });

}

/* DISABLE */
function disableSanctuary(){

    document.body.classList.remove("sanctuary");

    document.body.style.background = "#0a0a0a";
    document.body.style.color = "white";

    document.querySelectorAll('.glass').forEach(el=>{
        el.style.background = "rgba(255,255,255,0.05)";
        el.style.border = "1px solid rgba(255,255,255,0.08)";
    });

}

/* TOGGLE */
function toggleSanctuary(){

    state.sanctuary = !state.sanctuary;

    if(state.sanctuary){
        enableSanctuary();
    } else {
        disableSanctuary();
    }

}

/* =========================
💾 EXPORT SYSTEM
========================= */

function exportData(){

    const data = {
        memory: memory || [],
        ledger: ledger || [],
        timestamp: new Date().toISOString()
    };

    const blob = new Blob([JSON.stringify(data, null, 2)], {
        type: "application/json"
    });

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "pilot-system-backup.json";
    a.click();

    URL.revokeObjectURL(url);
}

/* =========================
📥 IMPORT SYSTEM
========================= */

function importData(e){

    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){

        try{
            const data = JSON.parse(event.target.result);

            if(data.memory) memory = data.memory;
            if(data.ledger) ledger = data.ledger;

            localStorage.setItem("memory", JSON.stringify(memory));
            localStorage.setItem("ledger", JSON.stringify(ledger));

            alert("System restored successfully.");

            render();

        }catch(err){
            alert("Invalid file.");
        }

    };

    reader.readAsText(file);
}

/* =========================
🎛 ADD UI BUTTONS
========================= */

const oldRender8 = render;

render = function(){

    oldRender8();

    const main = document.querySelector("#cockpit-main");

    if(main && !document.getElementById("export-btn")){

        const wrap = document.createElement("div");
        wrap.className = "mt-4 flex gap-2";

        const exportBtn = document.createElement("button");
        exportBtn.innerText = "Export Data";
        exportBtn.className = "glass p-2 text-xs";
        exportBtn.onclick = exportData;

        const importBtn = document.createElement("label");
        importBtn.innerText = "Import Data";
        importBtn.className = "glass p-2 text-xs cursor-pointer";

        const input = document.createElement("input");
        input.type = "file";
        input.style.display = "none";
        input.onchange = importData;

        importBtn.appendChild(input);

        wrap.appendChild(exportBtn);
        wrap.appendChild(importBtn);

        wrap.id = "export-btn";

        main.appendChild(wrap);
    }

};

/* =========================
🧠 INTELLIGENCE ENGINE
========================= */

function getSystemSuggestion(){

    const storm = getStormState().name;

    /* MEMORY PRESSURE */
    const memLoad = memory.length;

    /* LOW WINS */
    const lowWins = ledger.length < 3;

    /* =========================
    DECISION TREE
    ========================= */

    if(storm === "White Fog"){
        return {
            type:"ground",
            text:"You are in White Fog. Use Sensory Override → cold water or 5-4-3-2-1."
        };
    }

    if(storm === "Red Heat"){
        return {
            type:"cool",
            text:"Red Heat detected. Do nothing. Wait 90 seconds. Step away."
        };
    }

    if(storm === "Purple Pulse"){
        return {
            type:"calm",
            text:"Anxiety spike. Breathe 4-4-6. Do not engage thoughts."
        };
    }

    if(storm === "Yellow Static"){
        return {
            type:"focus",
            text:"Too many signals. Pick ONE task. Start 2 minutes only."
        };
    }

    if(storm === "Blue Gravity"){
        return {
            type:"move",
            text:"Low energy. Stand up. Move body 10 seconds."
        };
    }

    if(storm === "Green Flow" && lowWins){
        return {
            type:"build",
            text:"You are stable. Log a win to build momentum."
        };
    }

    if(memLoad > 10){
        return {
            type:"clear",
            text:"Memory load high. Offload or delete one item."
        };
    }

    return {
        type:"maintain",
        text:"Maintain current course. Continue forward."
    };

}

/* =========================

========================= */

function showOverlay(text){

    let existing = document.getElementById("god-overlay");
    if(existing) existing.remove();

    const overlay = document.createElement("div");

    overlay.id = "god-overlay";

    overlay.style.position = "fixed";
    overlay.style.bottom = "20px";
    overlay.style.left = "50%";
    overlay.style.transform = "translateX(-50%)";
    overlay.style.background = "rgba(0,0,0,0.8)";
    overlay.style.color = "white";
    overlay.style.padding = "10px 20px";
    overlay.style.borderRadius = "12px";
    overlay.style.zIndex = "9999";
    overlay.style.fontSize = "12px";

    overlay.innerText = text;

    document.body.appendChild(overlay);

    setTimeout(()=>{
        overlay.remove();
    },3000);

}
